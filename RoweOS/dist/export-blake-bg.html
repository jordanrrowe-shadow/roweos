<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>B.L.A.K.E. Background Export</title>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<style>
*, *::before, *::after { padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0a0a0a;
  color: #f0ece6;
  margin: 0;
  min-height: 100vh;
}
.page-header {
  text-align: center;
  padding: 40px 24px 20px;
}
.page-header h1 {
  font-size: 28px;
  font-weight: 300;
  letter-spacing: 2px;
  margin: 0 0 8px;
}
.page-header h1 .ember { color: #e74c3c; }
.page-header p {
  font-size: 13px;
  color: #666;
  margin: 0;
}
.exports {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
  max-width: 1400px;
  margin: 0 auto;
  padding: 24px 32px 60px;
}
.export-card {
  background: #111;
  border: 1px solid #222;
  border-radius: 12px;
  padding: 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.export-card h2 {
  font-size: 18px;
  font-weight: 500;
  margin: 0 0 4px;
  color: #e74c3c;
}
.export-card .dims {
  font-size: 11px;
  color: #555;
  margin-bottom: 16px;
}
.preview-wrap {
  width: 100%;
  aspect-ratio: 16 / 9;
  border-radius: 8px;
  overflow: hidden;
  background: #0a0a0a;
  margin-bottom: 16px;
}
.preview-wrap canvas {
  width: 100%;
  height: 100%;
  display: block;
}
.btn-row {
  display: flex;
  gap: 12px;
  align-items: center;
}
.download-btn {
  padding: 10px 24px;
  border-radius: 8px;
  border: none;
  background: #e74c3c;
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
}
.download-btn:hover { background: #ff4444; }
.download-btn:disabled {
  background: #333;
  color: #666;
  cursor: wait;
}
.status {
  font-size: 12px;
  color: #555;
  margin-top: 12px;
  min-height: 18px;
}
@media (max-width: 900px) {
  .exports { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="page-header">
  <h1>B.L.A.K.E. <span class="ember">Background Export</span></h1>
  <p>Render 5K (5120 x 2880) backgrounds for marketing and promo use</p>
</div>

<div class="exports">
  <!-- Organism -->
  <div class="export-card">
    <h2>Organism</h2>
    <div class="dims">5120 x 2880 &mdash; Ember theme</div>
    <div class="preview-wrap">
      <canvas id="organismPreview"></canvas>
    </div>
    <div class="btn-row">
      <button class="download-btn" id="dlOrganism">Download 5K PNG</button>
    </div>
    <div class="status" id="statusOrganism"></div>
  </div>

  <!-- Helix -->
  <div class="export-card">
    <h2>Helix</h2>
    <div class="dims">5120 x 2880 &mdash; Ember theme</div>
    <div class="preview-wrap">
      <canvas id="helixPreview"></canvas>
    </div>
    <div class="btn-row">
      <button class="download-btn" id="dlHelix">Download 5K PNG</button>
    </div>
    <div class="status" id="statusHelix"></div>
  </div>
</div>

<script>
// ============================================================
// SHADERS (inlined from blake.html)
// ============================================================

const blobVertexShader = `
uniform float uTime;
uniform float uNoiseAmp;
uniform float uNoiseFreq;
uniform float uSpeed;
uniform float uDetailMix;
uniform vec2 uMouse;
varying vec3 vNormal;
varying vec3 vPosition;
varying float vDisplacement;
varying vec3 vViewDir;

vec4 permute(vec4 x){return mod(((x*34.0)+1.0)*x,289.0);}
vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}

float snoise(vec3 v){
  const vec2 C=vec2(1.0/6.0,1.0/3.0);
  const vec4 D=vec4(0.0,0.5,1.0,2.0);
  vec3 i=floor(v+dot(v,C.yyy));
  vec3 x0=v-i+dot(i,C.xxx);
  vec3 g=step(x0.yzx,x0.xyz);
  vec3 l=1.0-g;
  vec3 i1=min(g.xyz,l.zxy);
  vec3 i2=max(g.xyz,l.zxy);
  vec3 x1=x0-i1+C.xxx;
  vec3 x2=x0-i2+C.yyy;
  vec3 x3=x0-D.yyy;
  i=mod(i,289.0);
  vec4 p=permute(permute(permute(
    i.z+vec4(0.0,i1.z,i2.z,1.0))
    +i.y+vec4(0.0,i1.y,i2.y,1.0))
    +i.x+vec4(0.0,i1.x,i2.x,1.0));
  float n_=1.0/7.0;
  vec3 ns=n_*D.wyz-D.xzx;
  vec4 j=p-49.0*floor(p*ns.z*ns.z);
  vec4 x_=floor(j*ns.z);
  vec4 y_=floor(j-7.0*x_);
  vec4 x=x_*ns.x+ns.yyyy;
  vec4 y=y_*ns.x+ns.yyyy;
  vec4 h=1.0-abs(x)-abs(y);
  vec4 b0=vec4(x.xy,y.xy);
  vec4 b1=vec4(x.zw,y.zw);
  vec4 s0=floor(b0)*2.0+1.0;
  vec4 s1=floor(b1)*2.0+1.0;
  vec4 sh=-step(h,vec4(0.0));
  vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;
  vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
  vec3 p0=vec3(a0.xy,h.x);
  vec3 p1=vec3(a0.zw,h.y);
  vec3 p2=vec3(a1.xy,h.z);
  vec3 p3=vec3(a1.zw,h.w);
  vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
  p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
  vec4 m=max(0.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0);
  m=m*m;
  return 42.0*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
}

void main(){
  float t=uTime*uSpeed;
  vec3 pos=position;
  float n1=snoise(pos*uNoiseFreq+t);
  float n2=snoise(pos*uNoiseFreq*2.0+t*1.3)*0.5;
  float n3=snoise(pos*uNoiseFreq*4.0+t*0.7)*0.25;
  float displacement=(n1+n2*uDetailMix+n3*uDetailMix*uDetailMix)*uNoiseAmp;
  vec3 worldPos=(modelMatrix*vec4(pos,1.0)).xyz;
  float mouseDist=length(worldPos.xy-uMouse);
  float mouseInfluence=smoothstep(1.5,0.0,mouseDist)*0.15;
  displacement+=mouseInfluence;
  vec3 newPos=pos+normal*displacement;
  vDisplacement=displacement;
  vNormal=normalize(normalMatrix*normal);
  vPosition=(modelViewMatrix*vec4(newPos,1.0)).xyz;
  vViewDir=normalize(-vPosition);
  gl_Position=projectionMatrix*modelViewMatrix*vec4(newPos,1.0);
}
`;

const blobFragmentShader = `
uniform vec3 uColor;
uniform vec3 uColorB;
uniform float uFresnelPower;
uniform float uOpacity;
uniform float uTime;
varying vec3 vNormal;
varying vec3 vPosition;
varying float vDisplacement;
varying vec3 vViewDir;

void main(){
  float fresnel=pow(1.0-max(dot(vViewDir,vNormal),0.0),uFresnelPower);
  float colorMix=vDisplacement*2.0+vNormal.y*0.3+sin(uTime*0.2)*0.1;
  vec3 baseColor=mix(uColor,uColorB,clamp(colorMix,0.0,1.0));
  vec3 lightDir=normalize(vec3(0.5,1.0,0.8));
  float sss=pow(max(dot(vViewDir,-lightDir+vNormal*0.5),0.0),3.0)*0.4;
  vec3 sssColor=baseColor*1.8+vec3(0.1,0.05,0.02);
  vec3 halfDir=normalize(lightDir+vViewDir);
  float spec=pow(max(dot(vNormal,halfDir),0.0),60.0)*0.5;
  vec3 specColor=mix(baseColor*1.6,vec3(1.0),0.25);
  vec3 rimColor=baseColor*1.5+vec3(0.1,0.08,0.04);
  vec3 color=baseColor;
  color+=sssColor*sss;
  color+=spec*specColor;
  color=mix(color,rimColor,fresnel*0.6);
  float alpha=mix(uOpacity,uOpacity*0.3,fresnel);
  alpha=clamp(alpha,0.0,1.0);
  gl_FragColor=vec4(color,alpha);
}
`;

const helixVertexShader = `
uniform float uTime;
varying vec2 vUv;
varying vec3 vNormal;
varying vec3 vPosition;
void main(){
  vUv=uv;
  vNormal=normalize(normalMatrix*normal);
  vPosition=(modelViewMatrix*vec4(position,1.0)).xyz;
  vec3 pos=position;
  pos+=normal*sin(uv.x*6.2832+uTime*0.4)*0.04;
  gl_Position=projectionMatrix*modelViewMatrix*vec4(pos,1.0);
}
`;

const helixFragmentShader = `
uniform float uTime;
uniform vec3 uColorA;
uniform vec3 uColorB;
uniform float uOpacity;
varying vec2 vUv;
varying vec3 vNormal;
varying vec3 vPosition;
void main(){
  float t=vUv.x+sin(uTime*0.12)*0.08;
  vec3 color=mix(uColorA,uColorB,clamp(t,0.0,1.0));
  vec3 viewDir=normalize(-vPosition);
  float fresnel=pow(1.0-max(dot(viewDir,vNormal),0.0),1.8);
  color=mix(color,color*1.6,fresnel*0.5);
  float radial=abs(vUv.y-0.5)*2.0;
  float edgeFade=1.0-smoothstep(0.3,1.0,radial);
  edgeFade=edgeFade*edgeFade;
  float alpha=uOpacity*edgeFade;
  gl_FragColor=vec4(color,alpha);
}
`;

// ============================================================
// CONSTANTS
// ============================================================

const EXPORT_W = 5120;
const EXPORT_H = 2880;

// Ember color palette
const EMBER = {
  primary: '#e74c3c',
  secondary: '#ff6600',
  deep: '#8b1a0a',
  hot: '#ff4444',
  orange: '#ff8800',
  dark: '#4a1a0a'
};

// Ember helix color sets
const HELIX_COLORS_EMBER = [
  { a: '#e74c3c', b: '#ff6600' },
  { a: '#8b1a0a', b: '#ff4444' },
  { a: '#cc2200', b: '#ff8800' },
  { a: '#a03020', b: '#e74c3c' }
];

// Organism shape params (organic style)
const ORGANISM_SHAPE = { amp: 0.22, freq: 1.1, speed: 0.25, detail: 0.5, fresnel: 2.5 };

// ============================================================
// ORGANISM RENDERER
// ============================================================

function createOrganismScene() {
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, EXPORT_W / EXPORT_H, 0.1, 100);
  camera.position.z = 4;

  const uniforms = {
    uTime: { value: 2.5 },
    uColor: { value: new THREE.Color(EMBER.deep) },
    uColorB: { value: new THREE.Color(EMBER.primary) },
    uMouse: { value: new THREE.Vector2(0.3, 0.2) },
    uNoiseAmp: { value: ORGANISM_SHAPE.amp },
    uNoiseFreq: { value: ORGANISM_SHAPE.freq },
    uSpeed: { value: ORGANISM_SHAPE.speed },
    uDetailMix: { value: ORGANISM_SHAPE.detail },
    uFresnelPower: { value: ORGANISM_SHAPE.fresnel },
    uOpacity: { value: 0.95 }
  };

  const geometry = new THREE.IcosahedronGeometry(1.15, 6);
  const material = new THREE.ShaderMaterial({
    uniforms,
    vertexShader: blobVertexShader,
    fragmentShader: blobFragmentShader,
    transparent: true,
    depthWrite: false,
    side: THREE.DoubleSide
  });

  const mesh = new THREE.Mesh(geometry, material);
  mesh.rotation.y = 0.4;
  mesh.rotation.x = 0.25;
  scene.add(mesh);

  return { scene, camera, uniforms, mesh };
}

function renderOrganism(canvas) {
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, preserveDrawingBuffer: true });
  renderer.setSize(EXPORT_W, EXPORT_H);
  renderer.setPixelRatio(1);
  renderer.setClearColor(0x0a0a0a, 1);

  const { scene, camera } = createOrganismScene();
  renderer.render(scene, camera);
  renderer.dispose();
  return canvas;
}

// ============================================================
// HELIX RENDERER
// ============================================================

function generateHelixCurveExport(index) {
  const points = [];
  const segs = 80;
  const configs = [
    { xStart: 12, yStart: 8, xEnd: -12, yEnd: -8, phase: 0, freq: 1.2, amp: 3.0, zAmp: 2.5, xWave: 1.5 },
    { xStart: 13, yStart: 7, xEnd: -11, yEnd: -9, phase: 1.8, freq: 0.9, amp: 3.5, zAmp: 2.0, xWave: 1.8 },
    { xStart: 11, yStart: 9, xEnd: -13, yEnd: -7, phase: 3.5, freq: 1.5, amp: 2.5, zAmp: 3.0, xWave: 1.0 },
    { xStart: 14, yStart: 6, xEnd: -10, yEnd: -10, phase: 5.0, freq: 1.1, amp: 3.2, zAmp: 2.2, xWave: 1.3 },
    { xStart: 10, yStart: 10, xEnd: -14, yEnd: -6, phase: 2.5, freq: 1.4, amp: 2.8, zAmp: 2.8, xWave: 1.1 },
    { xStart: 15, yStart: 5, xEnd: -9, yEnd: -11, phase: 4.2, freq: 1.0, amp: 3.8, zAmp: 1.8, xWave: 1.6 }
  ];
  const cfg = configs[index % configs.length];
  for (let i = 0; i <= segs; i++) {
    const t = i / segs;
    let x = cfg.xStart + (cfg.xEnd - cfg.xStart) * t;
    let y = cfg.yStart + (cfg.yEnd - cfg.yStart) * t;
    x += Math.sin(t * Math.PI * cfg.freq + cfg.phase) * cfg.xWave;
    y += Math.sin(t * Math.PI * cfg.freq * 1.3 + cfg.phase) * cfg.amp * 0.4;
    const z = Math.cos(t * Math.PI * 2.0 + cfg.phase) * cfg.zAmp;
    points.push(new THREE.Vector3(x, y, z));
  }
  return new THREE.CatmullRomCurve3(points);
}

function createHelixScene() {
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(65, EXPORT_W / EXPORT_H, 0.1, 100);
  camera.position.z = 10;

  const group = new THREE.Group();
  const uniformsList = [];

  for (let i = 0; i < 6; i++) {
    const curve = generateHelixCurveExport(i);
    const geometry = new THREE.TubeGeometry(curve, 160, 1.1, 20, false);
    const colors = HELIX_COLORS_EMBER[i % HELIX_COLORS_EMBER.length];
    const uniforms = {
      uTime: { value: i * 2.0 + 1.5 },
      uColorA: { value: new THREE.Color(colors.a) },
      uColorB: { value: new THREE.Color(colors.b) },
      uOpacity: { value: 0.85 }
    };
    const material = new THREE.ShaderMaterial({
      uniforms,
      vertexShader: helixVertexShader,
      fragmentShader: helixFragmentShader,
      transparent: true,
      depthWrite: false,
      side: THREE.DoubleSide
    });
    const mesh = new THREE.Mesh(geometry, material);
    group.add(mesh);
    uniformsList.push(uniforms);
  }

  // Set a visually interesting rotation
  group.rotation.z = 0.12;
  group.rotation.y = 0.08;
  scene.add(group);

  return { scene, camera, group, uniformsList };
}

function renderHelix(canvas) {
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, preserveDrawingBuffer: true });
  renderer.setSize(EXPORT_W, EXPORT_H);
  renderer.setPixelRatio(1);
  renderer.setClearColor(0x0a0a0a, 1);

  const { scene, camera } = createHelixScene();
  renderer.render(scene, camera);
  renderer.dispose();
  return canvas;
}

// ============================================================
// PREVIEW RENDERERS
// ============================================================

function renderPreview(canvasId, renderFn) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const wrap = canvas.parentElement;
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setSize(w, h);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x0a0a0a, 1);

  let sceneData;
  if (renderFn === 'organism') {
    sceneData = createOrganismScene();
  } else {
    sceneData = createHelixScene();
  }

  renderer.render(sceneData.scene, sceneData.camera);

  // Gentle animation loop for preview
  let time = renderFn === 'organism' ? 2.5 : 0;
  function animate() {
    requestAnimationFrame(animate);
    time += 0.016;
    if (renderFn === 'organism') {
      sceneData.uniforms.uTime.value = time;
      sceneData.mesh.rotation.y += 0.003;
      sceneData.mesh.rotation.x += 0.0015;
    } else {
      for (const u of sceneData.uniformsList) {
        u.uTime.value += 0.016;
      }
      sceneData.group.rotation.z += 0.0004;
      sceneData.group.rotation.y += 0.0002;
    }
    renderer.render(sceneData.scene, sceneData.camera);
  }
  animate();
}

// ============================================================
// DOWNLOAD
// ============================================================

function downloadPNG(renderFn, filename, statusId) {
  const btn = event.target;
  const status = document.getElementById(statusId);
  btn.disabled = true;
  btn.textContent = 'Rendering...';
  status.textContent = 'Rendering at 5120 x 2880. This may take a moment...';

  // Use requestAnimationFrame to let the UI update
  requestAnimationFrame(() => {
    try {
      const offscreen = document.createElement('canvas');
      offscreen.width = EXPORT_W;
      offscreen.height = EXPORT_H;

      if (renderFn === 'organism') {
        renderOrganism(offscreen);
      } else {
        renderHelix(offscreen);
      }

      offscreen.toBlob((blob) => {
        if (!blob) {
          status.textContent = 'Error: could not create PNG blob.';
          btn.disabled = false;
          btn.textContent = 'Download 5K PNG';
          return;
        }
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        btn.disabled = false;
        btn.textContent = 'Download 5K PNG';
        status.textContent = 'Downloaded! Save to: RoweOS/dist/images/promo/';
        status.style.color = '#e74c3c';
      }, 'image/png');
    } catch (err) {
      status.textContent = 'Error: ' + err.message;
      btn.disabled = false;
      btn.textContent = 'Download 5K PNG';
    }
  });
}

// ============================================================
// INIT
// ============================================================

window.addEventListener('DOMContentLoaded', () => {
  renderPreview('organismPreview', 'organism');
  renderPreview('helixPreview', 'helix');

  document.getElementById('dlOrganism').addEventListener('click', (e) => {
    downloadPNG('organism', 'organism-ember.png', 'statusOrganism');
  });

  document.getElementById('dlHelix').addEventListener('click', (e) => {
    downloadPNG('helix', 'helix-ember.png', 'statusHelix');
  });
});
</script>
</body>
</html>
