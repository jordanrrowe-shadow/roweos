<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoweOS - Sign In</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
.container{text-align:center;max-width:400px;padding:40px}
.logo{margin-bottom:32px}
.logo svg{width:80px;height:80px}
h1{font-size:28px;font-weight:700;letter-spacing:2px;margin-bottom:8px}
.subtitle{font-size:14px;color:rgba(255,255,255,0.5);letter-spacing:1px;margin-bottom:40px}
.btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px 24px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:12px;color:#fff;font-size:15px;font-weight:500;cursor:pointer;transition:background 0.2s}
.btn:hover{background:rgba(255,255,255,0.12)}
.status{font-size:13px;color:rgba(255,255,255,0.4);margin-top:16px;min-height:20px}
.error{color:#ef4444}
.divider{display:flex;align-items:center;gap:12px;margin:24px 0;color:rgba(255,255,255,0.3);font-size:12px;letter-spacing:2px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.1)}
.btn-beta{background:linear-gradient(135deg,#a89878,#d4b896);color:#0a0a0a;font-weight:600;border:none;text-decoration:none;transition:all 0.2s}
.btn-beta:hover{background:linear-gradient(135deg,#b8a888,#e5c068);transform:translateY(-2px);box-shadow:0 4px 20px rgba(168,152,120,0.35)}
.beta-note{font-size:12px;color:rgba(255,255,255,0.3);margin-top:10px;letter-spacing:0.5px}
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <img src="/icons/roweos-logo.png" alt="RoweOS" style="width:320px;">
  </div>
  <button class="btn" id="signInBtn" onclick="signIn()">
    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    Sign in with Google
  </button>
  <div class="status" id="status"></div>
  <div class="divider">OR</div>
  <a class="btn btn-beta" href="mailto:jordan@therowecollection.com?subject=RoweOS%20Beta%20Access%20Request&body=Name%3A%20%0AEmail%3A%20%0ACompany%3A%20%0A%0AHow%20did%20you%20hear%20about%20RoweOS%3F%0A">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#0a0a0a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    Sign up for Beta
  </a>
  <div class="beta-note">Limited beta — request an invite</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script>
// This config must match the hardcoded config in index.html
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBHv_Qzsv5ygLH9YehPKpMrgxRGwX0yv6w",
  authDomain: "roweos.firebaseapp.com",
  projectId: "roweos",
  storageBucket: "roweos.firebasestorage.app",
  messagingSenderId: "1084193250080",
  appId: "1:1084193250080:web:70981ab7261f5cdc141545"
};

firebase.initializeApp(FIREBASE_CONFIG);

function signIn() {
  const status = document.getElementById('status');
  status.textContent = 'Signing in...';
  status.className = 'status';

  const provider = new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({ prompt: 'select_account' });

  firebase.auth().signInWithPopup(provider)
    .then(function(result) {
      status.textContent = 'Setting up session...';
      return result.user.getIdToken();
    })
    .then(function(idToken) {
      return fetch('/api/session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ idToken: idToken })
      });
    })
    .then(function(response) {
      if (response.ok) {
        window.location.href = '/';
      } else {
        throw new Error('Session creation failed');
      }
    })
    .catch(function(error) {
      status.textContent = error.message || 'Sign-in failed';
      status.className = 'status error';
    });
}

// Check if already authenticated
firebase.auth().onAuthStateChanged(function(user) {
  if (user) {
    document.getElementById('status').textContent = 'Already signed in, redirecting...';
    user.getIdToken().then(function(idToken) {
      return fetch('/api/session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ idToken: idToken })
      });
    }).then(function() {
      window.location.href = '/';
    });
  }
});
</script>
</body>
</html>
