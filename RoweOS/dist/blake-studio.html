<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BLAKE Studio | RoweOS</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050507;--text:#f0ece6;--muted:#9a9590;--dim:#5e5955;
  --gold:#a89878;--gold-light:#c9a86c;--gold-glow:rgba(168,152,120,0.15);
  --card:rgba(14,14,18,0.85);--border:rgba(168,152,120,0.12);--border-light:rgba(168,152,120,0.2);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
::selection{background:rgba(168,152,120,0.3)}

/* ===== STAGE (fullscreen recording area) ===== */
.stage{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
#helixCanvas{position:absolute;top:0;left:0;width:100%;height:100%}
.blob-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2}
#blobCanvas{cursor:pointer}
.blob-glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;pointer-events:none;z-index:1}

/* ===== TEXT OVERLAY ===== */
.text-overlay{
  position:absolute;z-index:3;pointer-events:none;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;width:100%;padding:0 40px;
}
.text-overlay.top{top:8%;left:0}
.text-overlay.bottom{bottom:10%;left:0}
.text-overlay.center{top:50%;left:50%;transform:translate(-50%,-50%);width:100%}
.text-eyebrow{font-size:12px;letter-spacing:0.35em;text-transform:uppercase;color:var(--gold);margin-bottom:12px;opacity:0.8}
.text-headline{font-family:'Cormorant Garamond',serif;font-size:clamp(32px,6vw,64px);font-weight:300;line-height:1.15;color:var(--text);text-shadow:0 2px 40px rgba(0,0,0,0.5)}
.text-headline .gold{color:var(--gold-light)}
.text-sub{font-size:clamp(13px,1.8vw,16px);color:var(--muted);margin-top:16px;line-height:1.6;text-shadow:0 1px 20px rgba(0,0,0,0.5)}
.text-blake-letters{margin-bottom:8px}
.text-blake-letters .letter{font-family:'Cormorant Garamond',serif;font-size:clamp(48px,10vw,96px);font-weight:300;color:var(--gold-light)}
.text-blake-letters .dot{font-size:clamp(24px,5vw,48px);color:var(--gold);opacity:0.6;margin:0 2px;vertical-align:middle}
.text-pill{display:inline-flex;padding:6px 20px;border-radius:20px;border:1px solid var(--border-light);font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold);margin-top:20px}

/* ===== CONTROLS PANEL ===== */
.controls{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(5,5,7,0.92);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  border-top:1px solid var(--border);
  padding:16px 24px;
  transition:transform 0.4s cubic-bezier(0.16,1,0.3,1);
}
.controls.hidden{transform:translateY(100%)}
.controls-inner{max-width:1200px;margin:0 auto;display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap}
.control-group{display:flex;flex-direction:column;gap:8px;min-width:0}
.control-label{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--dim);font-weight:600}
.control-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}

/* Buttons */
.ctrl-btn{
  padding:6px 14px;border-radius:6px;font-size:11px;font-weight:500;
  font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.2s;
  border:1px solid var(--border);background:transparent;color:var(--muted);
  white-space:nowrap;
}
.ctrl-btn:hover{border-color:var(--border-light);color:var(--text)}
.ctrl-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(168,152,120,0.08)}
.ctrl-btn.primary{background:var(--gold);color:#0a0a0a;border-color:var(--gold);font-weight:600}
.ctrl-btn.primary:hover{background:var(--gold-light)}

/* Color swatches */
.color-swatch{
  width:24px;height:24px;border-radius:50%;border:2px solid transparent;
  cursor:pointer;transition:all 0.2s;flex-shrink:0;
}
.color-swatch:hover{transform:scale(1.15)}
.color-swatch.active{border-color:#fff;box-shadow:0 0 8px var(--gold-glow)}

/* Toggle */
.toggle-controls{
  position:fixed;bottom:16px;right:16px;z-index:200;
  width:40px;height:40px;border-radius:50%;
  background:var(--card);border:1px solid var(--border);
  color:var(--muted);display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.2s;font-size:16px;
}
.toggle-controls:hover{border-color:var(--gold);color:var(--gold)}
.toggle-controls.shifted{bottom:auto;top:16px}

/* Quip selector */
.quip-scroll{display:flex;gap:6px;overflow-x:auto;max-width:400px;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.quip-scroll::-webkit-scrollbar{height:3px}
.quip-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Helix opacity slider */
.helix-slider{width:100px;-webkit-appearance:none;height:3px;border-radius:2px;background:var(--border);outline:none}
.helix-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--gold);cursor:pointer}

/* Back link */
.back-link{
  position:fixed;top:16px;left:16px;z-index:200;
  display:flex;align-items:center;gap:8px;
  padding:8px 16px;border-radius:8px;
  background:var(--card);border:1px solid var(--border);
  color:var(--muted);font-size:12px;text-decoration:none;
  transition:all 0.2s;
}
.back-link:hover{border-color:var(--gold);color:var(--gold)}

/* Mobile */
@media(max-width:768px){
  .controls{padding:12px 16px}
  .controls-inner{gap:16px}
  .quip-scroll{max-width:260px}
  .text-headline{padding:0 20px}
  .blob-center canvas{width:180px!important;height:180px!important}
}
</style>

<!-- Blob Shaders -->
<script id="blobVertexShader" type="x-shader/x-vertex">
uniform float uTime;uniform float uNoiseAmp;uniform float uNoiseFreq;uniform float uSpeed;uniform float uDetailMix;uniform vec2 uMouse;
varying vec3 vNormal;varying vec3 vPosition;varying float vDisplacement;varying vec3 vViewDir;
vec4 permute(vec4 x){return mod(((x*34.0)+1.0)*x,289.0);}
vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
float snoise(vec3 v){const vec2 C=vec2(1.0/6.0,1.0/3.0);const vec4 D=vec4(0.0,0.5,1.0,2.0);vec3 i=floor(v+dot(v,C.yyy));vec3 x0=v-i+dot(i,C.xxx);vec3 g=step(x0.yzx,x0.xyz);vec3 l=1.0-g;vec3 i1=min(g.xyz,l.zxy);vec3 i2=max(g.xyz,l.zxy);vec3 x1=x0-i1+C.xxx;vec3 x2=x0-i2+C.yyy;vec3 x3=x0-D.yyy;i=mod(i,289.0);vec4 p=permute(permute(permute(i.z+vec4(0.0,i1.z,i2.z,1.0))+i.y+vec4(0.0,i1.y,i2.y,1.0))+i.x+vec4(0.0,i1.x,i2.x,1.0));float n_=1.0/7.0;vec3 ns=n_*D.wyz-D.xzx;vec4 j=p-49.0*floor(p*ns.z*ns.z);vec4 x_=floor(j*ns.z);vec4 y_=floor(j-7.0*x_);vec4 x=x_*ns.x+ns.yyyy;vec4 y=y_*ns.x+ns.yyyy;vec4 h=1.0-abs(x)-abs(y);vec4 b0=vec4(x.xy,y.xy);vec4 b1=vec4(x.zw,y.zw);vec4 s0=floor(b0)*2.0+1.0;vec4 s1=floor(b1)*2.0+1.0;vec4 sh=-step(h,vec4(0.0));vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;vec3 p0=vec3(a0.xy,h.x);vec3 p1=vec3(a0.zw,h.y);vec3 p2=vec3(a1.xy,h.z);vec3 p3=vec3(a1.zw,h.w);vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;vec4 m=max(0.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0);m=m*m;return 42.0*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));}
void main(){float t=uTime*uSpeed;vec3 pos=position;float n1=snoise(pos*uNoiseFreq+t);float n2=snoise(pos*uNoiseFreq*2.0+t*1.3)*0.5;float n3=snoise(pos*uNoiseFreq*4.0+t*0.7)*0.25;float displacement=(n1+n2*uDetailMix+n3*uDetailMix*uDetailMix)*uNoiseAmp;vec3 worldPos=(modelMatrix*vec4(pos,1.0)).xyz;float mouseDist=length(worldPos.xy-uMouse);float mouseInfluence=smoothstep(1.5,0.0,mouseDist)*0.15;displacement+=mouseInfluence;vec3 newPos=pos+normal*displacement;vDisplacement=displacement;vNormal=normalize(normalMatrix*normal);vPosition=(modelViewMatrix*vec4(newPos,1.0)).xyz;vViewDir=normalize(-vPosition);gl_Position=projectionMatrix*modelViewMatrix*vec4(newPos,1.0);}
</script>
<script id="blobFragmentShader" type="x-shader/x-fragment">
uniform vec3 uColor;uniform vec3 uColorB;uniform float uFresnelPower;uniform float uOpacity;uniform float uTime;
varying vec3 vNormal;varying vec3 vPosition;varying float vDisplacement;varying vec3 vViewDir;
void main(){float fresnel=pow(1.0-max(dot(vViewDir,vNormal),0.0),uFresnelPower);float colorMix=vDisplacement*2.0+vNormal.y*0.3+sin(uTime*0.2)*0.1;vec3 baseColor=mix(uColor,uColorB,clamp(colorMix,0.0,1.0));vec3 lightDir=normalize(vec3(0.5,1.0,0.8));float sss=pow(max(dot(vViewDir,-lightDir+vNormal*0.5),0.0),3.0)*0.4;vec3 sssColor=baseColor*1.8+vec3(0.1,0.05,0.02);vec3 halfDir=normalize(lightDir+vViewDir);float spec=pow(max(dot(vNormal,halfDir),0.0),60.0)*0.5;vec3 specColor=mix(baseColor*1.6,vec3(1.0),0.25);vec3 rimColor=baseColor*1.5+vec3(0.1,0.08,0.04);vec3 color=baseColor;color+=sssColor*sss;color+=spec*specColor;color=mix(color,rimColor,fresnel*0.6);float alpha=mix(uOpacity,uOpacity*0.3,fresnel);gl_FragColor=vec4(color,clamp(alpha,0.0,1.0));}
</script>
<script id="helixVertexShader" type="x-shader/x-vertex">
uniform float uTime;varying vec2 vUv;varying vec3 vNormal;varying vec3 vPosition;
void main(){vUv=uv;vNormal=normalize(normalMatrix*normal);vPosition=(modelViewMatrix*vec4(position,1.0)).xyz;vec3 pos=position;pos+=normal*sin(uv.x*6.2832+uTime*0.4)*0.04;gl_Position=projectionMatrix*modelViewMatrix*vec4(pos,1.0);}
</script>
<script id="helixFragmentShader" type="x-shader/x-fragment">
uniform float uTime;uniform vec3 uColorA;uniform vec3 uColorB;uniform float uOpacity;
varying vec2 vUv;varying vec3 vNormal;varying vec3 vPosition;
void main(){float t=vUv.x+sin(uTime*0.12)*0.08;vec3 color=mix(uColorA,uColorB,clamp(t,0.0,1.0));vec3 viewDir=normalize(-vPosition);float fresnel=pow(1.0-max(dot(viewDir,vNormal),0.0),1.8);color=mix(color,color*1.6,fresnel*0.5);float radial=abs(vUv.y-0.5)*2.0;float edgeFade=1.0-smoothstep(0.3,1.0,radial);edgeFade=edgeFade*edgeFade;gl_FragColor=vec4(color,uOpacity*edgeFade);}
</script>
</head>
<body>

<!-- Stage -->
<div class="stage">
  <canvas id="helixCanvas"></canvas>
  <div class="blob-glow" id="blobGlow" style="width:400px;height:400px;background:radial-gradient(circle,rgba(168,152,120,0.12) 0%,transparent 65%)"></div>
  <div class="blob-center" id="blobWrap">
    <canvas id="blobCanvas" width="560" height="560" style="width:280px;height:280px"></canvas>
  </div>
</div>

<!-- Text Overlays -->
<div class="text-overlay top" id="textTop" style="display:none"></div>
<div class="text-overlay center" id="textCenter" style="display:none"></div>
<div class="text-overlay bottom" id="textBottom" style="display:none"></div>

<!-- Back -->
<a href="/social" class="back-link" id="backLink">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  Content Studio
</a>

<!-- Toggle -->
<button class="toggle-controls" id="toggleBtn" onclick="toggleControls()">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v18M3 12h18"/></svg>
</button>

<!-- Controls -->
<div class="controls" id="controls">
  <div class="controls-inner">

    <!-- Quip / Text -->
    <div class="control-group" style="flex:1;min-width:200px">
      <div class="control-label">Text Overlay</div>
      <div class="quip-scroll" id="quipScroll"></div>
    </div>

    <!-- Text Position -->
    <div class="control-group">
      <div class="control-label">Position</div>
      <div class="control-row">
        <button class="ctrl-btn active" data-pos="bottom" onclick="setTextPosition('bottom',this)">Bottom</button>
        <button class="ctrl-btn" data-pos="center" onclick="setTextPosition('center',this)">Center</button>
        <button class="ctrl-btn" data-pos="top" onclick="setTextPosition('top',this)">Top</button>
        <button class="ctrl-btn" data-pos="none" onclick="setTextPosition('none',this)">None</button>
      </div>
    </div>

    <!-- Shape -->
    <div class="control-group">
      <div class="control-label">Shape</div>
      <div class="control-row">
        <button class="ctrl-btn" data-shape="smooth" onclick="setShape('smooth',this)">Smooth</button>
        <button class="ctrl-btn" data-shape="fluid" onclick="setShape('fluid',this)">Fluid</button>
        <button class="ctrl-btn" data-shape="organic" onclick="setShape('organic',this)">Organic</button>
        <button class="ctrl-btn active" data-shape="crystal" onclick="setShape('crystal',this)">Crystal</button>
        <button class="ctrl-btn" data-shape="sphere" onclick="setShape('sphere',this)">Sphere</button>
        <button class="ctrl-btn" data-shape="none" onclick="setShape('none',this)">Hide</button>
      </div>
    </div>

    <!-- Colors -->
    <div class="control-group">
      <div class="control-label">Color</div>
      <div class="control-row" id="colorSwatches"></div>
    </div>

    <!-- Helix -->
    <div class="control-group">
      <div class="control-label">Helix Opacity</div>
      <div class="control-row">
        <input type="range" class="helix-slider" id="helixOpacity" min="0" max="100" value="20" oninput="setHelixOpacity(this.value)">
        <button class="ctrl-btn" onclick="toggleHelixSpin()" id="spinBtn">Spin</button>
      </div>
    </div>

    <!-- Blob Size -->
    <div class="control-group">
      <div class="control-label">Blob Size</div>
      <div class="control-row">
        <input type="range" class="helix-slider" id="blobSize" min="120" max="500" value="280" oninput="setBlobSize(this.value)">
      </div>
    </div>

  </div>
</div>

<script>
// ============================================================
// BLAKE STUDIO
// ============================================================

var SHAPES = {
  smooth:  { amp: 0.18, freq: 0.7, speed: 0.2, detail: 0.0, fresnel: 3.0 },
  fluid:   { amp: 0.25, freq: 0.9, speed: 0.35, detail: 0.2, fresnel: 2.8 },
  organic: { amp: 0.22, freq: 1.1, speed: 0.25, detail: 0.5, fresnel: 2.5 },
  crystal: { amp: 0.35, freq: 1.5, speed: 0.3, detail: 1.0, fresnel: 2.5 },
  sphere:  { amp: 0.06, freq: 0.4, speed: 0.12, detail: 0.0, fresnel: 3.5 }
};

var COLORS = {
  gold:     { c1: '#a89878', c2: '#c0a86e', helix: [{ a:'#a89878',b:'#c0a86e'},{a:'#8b7355',b:'#d4b86a'},{a:'#6b5b3e',b:'#b8976a'},{a:'#9c8a6a',b:'#e0c878'}] },
  aurora:   { c1: '#00e676', c2: '#00bcd4', helix: [{ a:'#00e676',b:'#00bcd4'},{a:'#1de9b6',b:'#7c4dff'},{a:'#18ffff',b:'#651fff'},{a:'#69f0ae',b:'#448aff'}] },
  sunset:   { c1: '#ff6b6b', c2: '#ffa726', helix: [{ a:'#ff6b6b',b:'#ffa726'},{a:'#ff8a65',b:'#ffee58'},{a:'#ef5350',b:'#ff7043'},{a:'#ffa000',b:'#ff5252'}] },
  ocean:    { c1: '#0288d1', c2: '#00bcd4', helix: [{ a:'#0288d1',b:'#00bcd4'},{a:'#0097a7',b:'#4fc3f7'},{a:'#006064',b:'#26c6da'},{a:'#00838f',b:'#80deea'}] },
  neon:     { c1: '#ff00ff', c2: '#00ffff', helix: [{ a:'#ff00ff',b:'#00ffff'},{a:'#ff1744',b:'#f50057'},{a:'#00e5ff',b:'#76ff03'},{a:'#d500f9',b:'#ffea00'}] },
  ember:    { c1: '#4a1a0a', c2: '#e74c3c', helix: [{ a:'#4a1a0a',b:'#c0392b'},{a:'#2c1810',b:'#e74c3c'},{a:'#3d1408',b:'#d35400'},{a:'#1a0a04',b:'#e67e22'}] },
  midnight: { c1: '#0d0d2b', c2: '#2d1b69', helix: [{ a:'#0d0d2b',b:'#1a1a4e'},{a:'#120a2e',b:'#2d1b69'},{a:'#0a1628',b:'#1b3a5c'},{a:'#14082e',b:'#3a1878'}] },
  pastel:   { c1: '#f8bbd0', c2: '#e1bee7', helix: [{ a:'#f8bbd0',b:'#e1bee7'},{a:'#b3e5fc',b:'#c8e6c9'},{a:'#fff9c4',b:'#ffccbc'},{a:'#d1c4e9',b:'#b2dfdb'}] },
  ice:      { c1: '#e0f7fa', c2: '#b2ebf2', helix: [{ a:'#e0f7fa',b:'#80deea'},{a:'#b2ebf2',b:'#4dd0e1'},{a:'#80deea',b:'#26c6da'},{a:'#b2ebf2',b:'#00bcd4'}] }
};

var QUIPS = [
  { eyebrow: 'Introducing', headline: '<span class="gold">B</span>.<span class="gold">L</span>.<span class="gold">A</span>.<span class="gold">K</span>.<span class="gold">E</span>.', sub: 'Brand Life AI Knowledge Engine' },
  { eyebrow: 'B.L.A.K.E.', headline: 'Not an assistant.<br>An entity.', sub: '' },
  { eyebrow: 'B.L.A.K.E.', headline: 'Your brand<br>has a mind now.', sub: '' },
  { eyebrow: 'B.L.A.K.E.', headline: 'Intelligence.<br>Embodied.', sub: '' },
  { eyebrow: 'RoweOS', headline: 'Meet <span class="gold">BLAKE</span>', sub: 'The adaptive AI at the heart of everything.' },
  { eyebrow: 'B.L.A.K.E.', headline: 'The more you use it,<br>the sharper it gets.', sub: '' },
  { eyebrow: 'BrandAI + LifeAI', headline: 'Two minds.<br>One intelligence.', sub: '' },
  { eyebrow: '10 Agents. 150+ Operations.', headline: 'One <span class="gold">BLAKE</span>.', sub: '' },
  { eyebrow: 'B.L.A.K.E.', headline: 'Adapts to your brand.<br>Adapts to your life.', sub: '' },
  { eyebrow: 'B.L.A.K.E.', headline: 'Your intelligence<br>stays yours.', sub: 'Sovereign architecture. No data harvesting.' },
  { eyebrow: '', headline: '', sub: '' },
  { eyebrow: 'roweos.com/blake', headline: '', sub: '' },
];

var _shapeTarget = SHAPES.crystal;
var _currentColor = 'gold';
var _currentQuip = 0;
var _textPos = 'bottom';
var _controlsVisible = true;
var _helixSpinning = true;

// ─── BLOB ───
var _bScene, _bCamera, _bRenderer, _bMesh, _bUniforms, _bAnimId;
var _bMouse = { x: 0, y: 0 };
var _blobVisible = true;

function initBlob() {
  if (typeof THREE === 'undefined') { setTimeout(initBlob, 200); return; }
  var canvas = document.getElementById('blobCanvas');
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  _bScene = new THREE.Scene();
  _bCamera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
  _bCamera.position.z = 4;
  _bRenderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
  _bRenderer.setSize(280, 280);
  _bRenderer.setPixelRatio(dpr);
  _bRenderer.setClearColor(0x000000, 0);

  var c = COLORS[_currentColor];
  _bUniforms = {
    uTime:{value:0},uColor:{value:new THREE.Color(c.c1)},uColorB:{value:new THREE.Color(c.c2)},
    uMouse:{value:new THREE.Vector2(0,0)},uNoiseAmp:{value:0.35},uNoiseFreq:{value:1.5},
    uSpeed:{value:0.3},uDetailMix:{value:1.0},uFresnelPower:{value:2.5},uOpacity:{value:0.92}
  };
  var vs = document.getElementById('blobVertexShader').textContent;
  var fs = document.getElementById('blobFragmentShader').textContent;
  var geo = new THREE.IcosahedronGeometry(1, 5);
  var mat = new THREE.ShaderMaterial({ uniforms:_bUniforms, vertexShader:vs, fragmentShader:fs, transparent:true, depthWrite:false, side:THREE.DoubleSide });
  _bMesh = new THREE.Mesh(geo, mat);
  _bScene.add(_bMesh);

  var wrap = document.getElementById('blobWrap');
  wrap.addEventListener('mousemove', function(e) {
    var r = wrap.getBoundingClientRect();
    _bMouse.x = ((e.clientX - r.left) / r.width) * 2 - 1;
    _bMouse.y = -((e.clientY - r.top) / r.height) * 2 + 1;
  });
  wrap.addEventListener('mouseleave', function() { _bMouse.x = 0; _bMouse.y = 0; });
  wrap.addEventListener('touchmove', function(e) {
    var r = wrap.getBoundingClientRect();
    _bMouse.x = ((e.touches[0].clientX - r.left) / r.width) * 2 - 1;
    _bMouse.y = -((e.touches[0].clientY - r.top) / r.height) * 2 + 1;
  }, { passive: true });

  var clock = new THREE.Clock();
  function animate() {
    _bAnimId = requestAnimationFrame(animate);
    if (!_bRenderer) return;
    var dt = clock.getDelta();
    _bUniforms.uTime.value += dt;
    _bUniforms.uMouse.value.x += (_bMouse.x * 1.5 - _bUniforms.uMouse.value.x) * 0.05;
    _bUniforms.uMouse.value.y += (_bMouse.y * 1.5 - _bUniforms.uMouse.value.y) * 0.05;
    _bMesh.rotation.y += dt * 0.15;
    _bMesh.rotation.x += dt * 0.08;
    var s = _shapeTarget;
    _bUniforms.uNoiseAmp.value += (s.amp - _bUniforms.uNoiseAmp.value) * 0.03;
    _bUniforms.uSpeed.value += (s.speed - _bUniforms.uSpeed.value) * 0.03;
    _bUniforms.uNoiseFreq.value += (s.freq - _bUniforms.uNoiseFreq.value) * 0.03;
    _bUniforms.uDetailMix.value += (s.detail - _bUniforms.uDetailMix.value) * 0.03;
    _bUniforms.uFresnelPower.value += (s.fresnel - _bUniforms.uFresnelPower.value) * 0.03;
    _bRenderer.render(_bScene, _bCamera);
  }
  animate();
}

// ─── HELIX ───
var _hScene, _hCamera, _hRenderer, _hGroup, _hUniforms = [], _hAnimId;

function initHelix() {
  if (typeof THREE === 'undefined') { setTimeout(initHelix, 200); return; }
  var canvas = document.getElementById('helixCanvas');
  var w = window.innerWidth, h = window.innerHeight;
  var dpr = Math.min(window.devicePixelRatio || 1, 1.5);
  _hScene = new THREE.Scene();
  _hCamera = new THREE.PerspectiveCamera(65, w / h, 0.1, 100);
  _hCamera.position.z = 10;
  _hRenderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: false });
  _hRenderer.setSize(w, h); _hRenderer.setPixelRatio(dpr); _hRenderer.setClearColor(0x000000, 0);

  var vs = document.getElementById('helixVertexShader').textContent;
  var fs = document.getElementById('helixFragmentShader').textContent;
  var c = COLORS[_currentColor].helix;
  _hGroup = new THREE.Group();

  var cfgs = [
    { xS:12,yS:8,xE:-12,yE:-8,ph:0,fr:1.2,am:3.0,zA:2.5,xW:1.5 },
    { xS:13,yS:7,xE:-11,yE:-9,ph:1.8,fr:0.9,am:3.5,zA:2.0,xW:1.8 },
    { xS:11,yS:9,xE:-13,yE:-7,ph:3.5,fr:1.5,am:2.5,zA:3.0,xW:1.0 },
    { xS:14,yS:6,xE:-10,yE:-10,ph:5.0,fr:1.1,am:3.2,zA:2.2,xW:1.3 }
  ];
  for (var i = 0; i < 4; i++) {
    var pts = [], cfg = cfgs[i];
    for (var j = 0; j <= 60; j++) {
      var t = j / 60;
      var x = cfg.xS + (cfg.xE - cfg.xS) * t + Math.sin(t * Math.PI * cfg.fr + cfg.ph) * cfg.xW;
      var y = cfg.yS + (cfg.yE - cfg.yS) * t + Math.sin(t * Math.PI * cfg.fr * 1.3 + cfg.ph) * cfg.am * 0.4;
      var z = Math.cos(t * Math.PI * 2.0 + cfg.ph) * cfg.zA;
      pts.push(new THREE.Vector3(x, y, z));
    }
    var curve = new THREE.CatmullRomCurve3(pts);
    var geo = new THREE.TubeGeometry(curve, 120, 1.1, 16, false);
    var u = { uTime:{value:i*2.0}, uColorA:{value:new THREE.Color(c[i].a)}, uColorB:{value:new THREE.Color(c[i].b)}, uOpacity:{value:0.85} };
    var mat = new THREE.ShaderMaterial({ uniforms:u, vertexShader:vs, fragmentShader:fs, transparent:true, depthWrite:false, side:THREE.DoubleSide });
    _hGroup.add(new THREE.Mesh(geo, mat));
    _hUniforms.push(u);
  }
  _hScene.add(_hGroup);

  var clock = new THREE.Clock();
  function animate() {
    _hAnimId = requestAnimationFrame(animate);
    if (!_hRenderer) return;
    var dt = clock.getDelta();
    for (var i = 0; i < _hUniforms.length; i++) _hUniforms[i].uTime.value += dt;
    if (_hGroup && _helixSpinning) {
      _hGroup.rotation.z += dt * 0.01;
      _hGroup.rotation.y += dt * 0.005;
    }
    _hRenderer.render(_hScene, _hCamera);
  }
  animate();

  window.addEventListener('resize', function() {
    var w2 = window.innerWidth, h2 = window.innerHeight;
    _hCamera.aspect = w2 / h2;
    _hCamera.updateProjectionMatrix();
    _hRenderer.setSize(w2, h2);
  });
}

// ─── CONTROLS ───

function setShape(name, btn) {
  var all = document.querySelectorAll('[data-shape]');
  for (var i = 0; i < all.length; i++) all[i].classList.remove('active');
  if (btn) btn.classList.add('active');
  if (name === 'none') {
    _blobVisible = false;
    document.getElementById('blobWrap').style.display = 'none';
    document.getElementById('blobGlow').style.display = 'none';
  } else {
    _blobVisible = true;
    document.getElementById('blobWrap').style.display = '';
    document.getElementById('blobGlow').style.display = '';
    _shapeTarget = SHAPES[name];
  }
}

function setColor(name) {
  _currentColor = name;
  var c = COLORS[name];
  if (_bUniforms) {
    _bUniforms.uColor.value.set(c.c1);
    _bUniforms.uColorB.value.set(c.c2);
  }
  for (var i = 0; i < _hUniforms.length; i++) {
    _hUniforms[i].uColorA.value.set(c.helix[i].a);
    _hUniforms[i].uColorB.value.set(c.helix[i].b);
  }
  document.getElementById('blobGlow').style.background = 'radial-gradient(circle, ' + c.c1 + '1a 0%, transparent 65%)';
  var all = document.querySelectorAll('.color-swatch');
  for (var j = 0; j < all.length; j++) all[j].classList.toggle('active', all[j].dataset.color === name);
}

function setHelixOpacity(val) {
  document.getElementById('helixCanvas').style.opacity = val / 100;
}

function toggleHelixSpin() {
  _helixSpinning = !_helixSpinning;
  document.getElementById('spinBtn').classList.toggle('active', _helixSpinning);
}

function setBlobSize(val) {
  var v = parseInt(val);
  var canvas = document.getElementById('blobCanvas');
  canvas.style.width = v + 'px';
  canvas.style.height = v + 'px';
  var glow = document.getElementById('blobGlow');
  glow.style.width = (v * 1.4) + 'px';
  glow.style.height = (v * 1.4) + 'px';
}

function setTextPosition(pos, btn) {
  _textPos = pos;
  var all = document.querySelectorAll('[data-pos]');
  for (var i = 0; i < all.length; i++) all[i].classList.remove('active');
  if (btn) btn.classList.add('active');
  renderQuip();
}

function setQuip(idx) {
  _currentQuip = idx;
  var all = document.querySelectorAll('[data-quip]');
  for (var i = 0; i < all.length; i++) all[i].classList.toggle('active', parseInt(all[i].dataset.quip) === idx);
  renderQuip();
}

function renderQuip() {
  var q = QUIPS[_currentQuip];
  var top = document.getElementById('textTop');
  var center = document.getElementById('textCenter');
  var bottom = document.getElementById('textBottom');
  top.style.display = 'none';
  center.style.display = 'none';
  bottom.style.display = 'none';

  if (_textPos === 'none' || (!q.eyebrow && !q.headline && !q.sub)) return;

  var html = '';
  if (q.eyebrow) html += '<div class="text-eyebrow">' + q.eyebrow + '</div>';
  if (q.headline) html += '<div class="text-headline">' + q.headline + '</div>';
  if (q.sub) html += '<div class="text-sub">' + q.sub + '</div>';

  var target = _textPos === 'top' ? top : _textPos === 'center' ? center : bottom;
  target.innerHTML = html;
  target.style.display = 'flex';
}

function toggleControls() {
  _controlsVisible = !_controlsVisible;
  document.getElementById('controls').classList.toggle('hidden', !_controlsVisible);
  var btn = document.getElementById('toggleBtn');
  var back = document.getElementById('backLink');
  if (_controlsVisible) {
    btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>';
    btn.classList.remove('shifted');
    back.style.display = '';
  } else {
    btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9c.26.604.852.997 1.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>';
    btn.classList.add('shifted');
    back.style.display = 'none';
  }
}

// ─── BUILD UI ───

function buildColorSwatches() {
  var container = document.getElementById('colorSwatches');
  var html = '';
  var keys = Object.keys(COLORS);
  for (var i = 0; i < keys.length; i++) {
    var k = keys[i];
    var c = COLORS[k];
    html += '<div class="color-swatch' + (k === 'gold' ? ' active' : '') + '" data-color="' + k + '" style="background:linear-gradient(135deg,' + c.c1 + ',' + c.c2 + ');" onclick="setColor(\'' + k + '\')"></div>';
  }
  container.innerHTML = html;
}

function buildQuipButtons() {
  var container = document.getElementById('quipScroll');
  var html = '';
  var labels = ['Introducing', 'Entity', 'Brand Mind', 'Embodied', 'Meet BLAKE', 'Grows', 'Two Minds', 'Numbers', 'Adapts', 'Sovereign', 'Clean', 'URL Only'];
  for (var i = 0; i < QUIPS.length; i++) {
    html += '<button class="ctrl-btn' + (i === 0 ? ' active' : '') + '" data-quip="' + i + '" onclick="setQuip(' + i + ')">' + labels[i] + '</button>';
  }
  container.innerHTML = html;
}

// ─── INIT ───

document.addEventListener('DOMContentLoaded', function() {
  initBlob();
  initHelix();
  buildColorSwatches();
  buildQuipButtons();
  setHelixOpacity(20);
  setQuip(0);
  renderQuip();
  // Keyboard: H to hide controls, arrows to cycle quips
  document.addEventListener('keydown', function(e) {
    if (e.key === 'h' || e.key === 'H') toggleControls();
    if (e.key === 'ArrowRight') setQuip((_currentQuip + 1) % QUIPS.length);
    if (e.key === 'ArrowLeft') setQuip((_currentQuip - 1 + QUIPS.length) % QUIPS.length);
  });
});
</script>
