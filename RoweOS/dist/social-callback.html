<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoweOS - Connecting...</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#09090b;color:#f4f4f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center}
.container{max-width:360px;padding:40px}
.spinner{width:40px;height:40px;border:3px solid rgba(168,152,120,0.15);border-top-color:#a89878;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 24px}
@keyframes spin{to{transform:rotate(360deg)}}
h2{font-size:18px;font-weight:600;margin-bottom:8px}
.status{font-size:14px;color:rgba(255,255,255,0.5);margin-bottom:16px;min-height:40px}
.error{color:#ef4444}
.success{color:#22c55e}
</style>
</head>
<body>
<div class="container">
  <div class="spinner" id="spinner"></div>
  <h2>Connecting Account</h2>
  <div class="status" id="status">Exchanging authorization...</div>
</div>

<script>
(function() {
  var statusEl = document.getElementById('status');
  var spinnerEl = document.getElementById('spinner');

  function setStatus(msg, type) {
    statusEl.textContent = msg;
    statusEl.className = 'status' + (type ? ' ' + type : '');
    if (type === 'success' || type === 'error') {
      spinnerEl.style.display = 'none';
    }
  }

  // v18.3: Track platform for redirect flow
  var _detectedPlatform = null;

  function done(success) {
    if (window.opener) {
      setTimeout(function() { window.close(); }, success ? 1000 : 3000);
    } else {
      // v19.0: Mobile PWA — don't redirect (loads login screen in Safari, confusing).
      // Show "go back to RoweOS" message. The PWA's visibilitychange listener detects the connection.
      var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      if (isMobile && success) {
        spinnerEl.style.display = 'none';
        var returnUrl = '/' + (_detectedPlatform ? '?social_callback=' + _detectedPlatform : '');
        // v20.12: Always show "Back to RoweOS" button — user may be in-browser (not PWA)
        statusEl.innerHTML = '<span style="color:#22c55e;font-weight:600;">Connected!</span><br><br>' +
          '<a href="' + returnUrl + '" style="display:inline-block;background:#a89878;color:#fff;padding:12px 32px;font-size:15px;font-weight:600;border-radius:10px;text-decoration:none;margin-bottom:12px;">Back to RoweOS</a><br>' +
          '<span style="font-size:13px;color:rgba(255,255,255,0.4);">Or switch to RoweOS on your Home Screen</span>';
        return;
      }
      // Desktop fallback: redirect with query param
      var returnUrl = '/' + (success && _detectedPlatform ? '?social_callback=' + _detectedPlatform : '');
      setTimeout(function() { window.location.href = returnUrl; }, success ? 1000 : 3000);
    }
  }

  // v18.0: Parse brand/life scope from pending context or state prefix
  function getScopeFromContext(state) {
    // Primary: read from localStorage (set by connect function before popup opened)
    try {
      var pending = localStorage.getItem('roweos_social_pending_context');
      if (pending && (pending.indexOf('_brand_') === 0 || pending.indexOf('_life_') === 0)) {
        localStorage.removeItem('roweos_social_pending_context');
        return pending;
      }
    } catch(e) {}
    // Fallback: parse scope code from state prefix (iOS Safari localStorage partitioning)
    // State format: "platform_scopeCode_randomString" e.g. "x_b2_abc123" or "threads_l1_xyz789"
    if (state) {
      var parts = state.split('_');
      // parts[0] = platform prefix (x, threads, ig), parts[1] might be scope code
      var scopePart = parts.length >= 3 ? parts[1] : null;
      if (scopePart && scopePart.length >= 2) {
        var scopeType = scopePart.charAt(0); // 'b' or 'l'
        var scopeIdx = scopePart.substring(1);
        if (scopeType === 'b' && !isNaN(parseInt(scopeIdx))) return '_brand_' + scopeIdx;
        if (scopeType === 'l' && !isNaN(parseInt(scopeIdx))) return '_life_' + scopeIdx;
      }
    }
    // Default: brand 0 (backward compat with old state format like "x_abc123")
    return '_brand_0';
  }

  try {
    var params = new URLSearchParams(window.location.search);
    var code = params.get('code');
    var state = params.get('state');
    var error = params.get('error');

    if (error) {
      setStatus('Authorization denied: ' + (params.get('error_description') || error), 'error');
      done(false);
      return;
    }

    if (!code || !state) {
      setStatus('Missing authorization code. Please try again.', 'error');
      done(false);
      return;
    }

    // v20.6: Parse embedded PKCE data from state before platform detection
    // v20.12: UID embedded as last part with 'u:' prefix for Firestore token storage
    // State format for X: "x_scopeCode_random~codeVerifier~clientId~u:firebaseUid"
    // State format for Threads/IG: "threads_scopeCode_random~u:firebaseUid"
    var _embeddedVerifier = '';
    var _embeddedClientId = '';
    var _embeddedUid = '';
    var stateBase = state; // original state for platform matching
    if (state && state.indexOf('~') !== -1) {
      var stateParts = state.split('~');
      stateBase = stateParts[0]; // "x_b2_abc123" (without embedded data)
      if (stateParts.length >= 2) _embeddedVerifier = stateParts[1];
      if (stateParts.length >= 3) _embeddedClientId = stateParts[2];
      // v20.12: Extract UID from last part (prefixed with 'u:')
      var lastPart = stateParts[stateParts.length - 1];
      if (lastPart && lastPart.indexOf('u:') === 0) {
        _embeddedUid = lastPart.substring(2);
      }
    }

    // Determine platform from stored state (localStorage, shared with opener)
    var xState = localStorage.getItem('roweos_x_state');
    var tState = localStorage.getItem('roweos_threads_state');
    var igState = localStorage.getItem('roweos_ig_state');
    var platform = null;

    if (stateBase === xState) platform = 'x';
    else if (state === tState) platform = 'threads';
    else if (state === igState) platform = 'instagram';

    // v17.3: Fallback — detect platform from state prefix (iOS Safari partitions localStorage between popup/redirect contexts)
    if (!platform && stateBase) {
      if (stateBase.indexOf('x_') === 0) platform = 'x';
      else if (stateBase.indexOf('threads_') === 0) platform = 'threads';
      else if (stateBase.indexOf('ig_') === 0) platform = 'instagram';
    }

    // v22.24: Gmail Mail OAuth — separate flow via gmail-proxy serverless function
    if (stateBase && stateBase.indexOf('gmail_mail_') === 0) {
      _detectedPlatform = 'gmail';
      setStatus('Connecting Gmail...');
      localStorage.removeItem('roweos_mail_oauth_state');
      var gmailRedirectUri = window.location.origin + '/social-callback';
      fetch('/api/gmail-proxy', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'exchange', code: code, redirectUri: gmailRedirectUri, uid: _embeddedUid })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.error) {
          setStatus('Gmail connection failed: ' + data.error, 'error');
          done(false);
          return;
        }
        // Store tokens in mail config localStorage
        try {
          var configStr = localStorage.getItem('roweos_mail_config');
          var config = configStr ? JSON.parse(configStr) : {};
          config.gmailEmail = data.email || '';
          config.gmailToken = data.accessToken || '';
          config.gmailRefreshToken = data.refreshToken || '';
          config.gmailExpiresAt = data.expiresAt || 0;
          localStorage.setItem('roweos_mail_config', JSON.stringify(config));
        } catch(e) {}
        // Notify opener window
        if (window.opener) {
          try { window.opener.postMessage({ type: 'gmail_mail_connected', email: data.email }, '*'); } catch(e) {}
        }
        setStatus('Gmail connected' + (data.email ? ' (' + data.email + ')' : ''), 'success');
        done(true);
      })
      .catch(function(err) {
        setStatus('Gmail connection failed: ' + (err.message || 'Network error'), 'error');
        done(false);
      });
      return; // Skip social platform flow
    }

    if (!platform) {
      setStatus('Unknown authorization state. Please try connecting again.', 'error');
      done(false);
      return;
    }

    // v18.3: Store detected platform for redirect flow
    _detectedPlatform = platform;

    // v18.0: Determine brand/life scope for this connection
    // v20.6: Use stateBase (without embedded data) for scope parsing
    var scope = getScopeFromContext(stateBase);

    var platformNames = { x: 'X', threads: 'Threads', instagram: 'Instagram' };
    setStatus('Connecting ' + platformNames[platform] + '...');

    var origin = window.location.origin;
    var redirectUri = origin + '/social-callback';

    // Build request body
    var body = { platform: platform, code: code, redirectUri: redirectUri };
    // v20.12: Pass UID and scope for Firestore token storage (cross-device)
    if (_embeddedUid) { body.uid = _embeddedUid; body.scope = scope; }

    if (platform === 'x') {
      body.action = 'exchange';
      // v20.6: Try localStorage first, fall back to embedded values from state parameter
      // (iOS Safari / mobile redirect partitions localStorage — embedded values survive the redirect)
      body.codeVerifier = localStorage.getItem('roweos_x_code_verifier') || _embeddedVerifier || '';
      body.clientId = localStorage.getItem('roweos_x_client_id') || _embeddedClientId || '';
      localStorage.removeItem('roweos_x_code_verifier');
      localStorage.removeItem('roweos_x_state');
      localStorage.removeItem('roweos_x_client_id');
    } else if (platform === 'threads') {
      localStorage.removeItem('roweos_threads_state');
    } else if (platform === 'instagram') {
      localStorage.removeItem('roweos_ig_state');
    }

    // Exchange code for tokens via Vercel function
    fetch('/api/social-auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) {
        var detail = data.detail ? ' (' + JSON.stringify(data.detail) + ')' : '';
        setStatus('Connection failed: ' + data.error + detail, 'error');
        done(false);
        return;
      }

      // Store token data in localStorage for the main app to pick up
      // v18.0: Write to scoped keys using brand/life scope
      var tokenData = {
        accessToken: data.accessToken || '',
        refreshToken: data.refreshToken || '',
        expiresAt: data.expiresAt || 0,
        userId: data.userId || '',
        updatedAt: new Date().toISOString()
      };
      localStorage.setItem('roweos_social_pending_token_' + platform + scope, JSON.stringify(tokenData));
      // v17.2: Also write to final token key directly (pending pickup has timing bug)
      localStorage.setItem('roweos_social_token_' + platform + scope, JSON.stringify(tokenData));

      // Set connected state (main app polls for this) — scoped key
      localStorage.setItem('roweos_social_' + platform + '_connected' + scope, 'true');

      // v17.5: Fetch @handle for X, Threads, and Instagram — write to scoped handle key
      if (platform === 'x' && data.accessToken) {
        setStatus('Getting your X profile...');
        fetch('https://api.x.com/2/users/me', {
          headers: { 'Authorization': 'Bearer ' + data.accessToken }
        }).then(function(r) { return r.json(); }).then(function(user) {
          var handle = user.data && user.data.username ? user.data.username : '';
          if (handle) localStorage.setItem('roweos_social_x_handle' + scope, handle);
          setStatus('Connected as @' + handle, 'success');
          done(true);
        }).catch(function() {
          setStatus('X connected', 'success');
          done(true);
        });
      } else if (platform === 'threads' && data.accessToken) {
        setStatus('Getting your Threads profile...');
        fetch('https://graph.threads.net/v1.0/me?fields=username&access_token=' + encodeURIComponent(data.accessToken))
        .then(function(r) { return r.json(); }).then(function(user) {
          var handle = user.username || '';
          if (handle) localStorage.setItem('roweos_social_threads_handle' + scope, handle);
          setStatus(handle ? 'Connected as @' + handle : 'Threads connected', 'success');
          done(true);
        }).catch(function() {
          setStatus('Threads connected', 'success');
          done(true);
        });
      } else if (platform === 'instagram' && data.accessToken) {
        setStatus('Getting your Instagram profile...');
        fetch('https://graph.instagram.com/v21.0/me?fields=username&access_token=' + encodeURIComponent(data.accessToken))
        .then(function(r) { return r.json(); }).then(function(user) {
          var handle = user.username || '';
          if (handle) localStorage.setItem('roweos_social_instagram_handle' + scope, handle);
          setStatus(handle ? 'Connected as @' + handle : 'Instagram connected', 'success');
          done(true);
        }).catch(function() {
          setStatus('Instagram connected', 'success');
          done(true);
        });
      } else {
        setStatus(platformNames[platform] + ' connected', 'success');
        done(true);
      }
    })
    .catch(function(err) {
      setStatus('Connection failed: ' + (err.message || 'Network error'), 'error');
      done(false);
    });

  } catch(e) {
    setStatus('Unexpected error: ' + e.message, 'error');
    done(false);
  }
})();
</script>
</body>
</html>
