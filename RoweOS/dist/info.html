<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoweOS: Get Started</title>
    <meta name="description" content="Your AI operating system for brands and life. Choose your plan and get your access key instantly.">
    <meta property="og:title" content="RoweOS: Get Started">
    <meta property="og:description" content="Your AI operating system for brands and life. Choose your plan and get your access key instantly.">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: #0a0a0a;
            color: #e8e4df;
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: 300;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient background glow */
        body::before {
            content: '';
            position: fixed;
            top: -40%;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(ellipse at center,
                rgba(242, 223, 197, 0.04) 0%,
                rgba(139, 123, 103, 0.02) 40%,
                transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -30%;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(ellipse at center,
                rgba(139, 123, 103, 0.03) 0%,
                transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .newsletter-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .wordmark {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            background: linear-gradient(135deg, #f2dfc5 0%, #c4b59e 50%, #8b7b67 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 64px;
            opacity: 0;
            transform: translateY(-8px);
            animation: fadeInDown 0.8s ease-out 0.2s forwards;
        }

        .headline {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 48px;
            font-weight: 300;
            line-height: 1.15;
            letter-spacing: -0.01em;
            color: #f5f2ee;
            margin-bottom: 20px;
            opacity: 0;
            transform: translateY(12px);
            animation: fadeInUp 0.8s ease-out 0.4s forwards;
        }

        .tagline {
            font-size: 16px;
            font-weight: 300;
            line-height: 1.7;
            color: rgba(232, 228, 223, 0.55);
            max-width: 380px;
            margin-bottom: 48px;
            opacity: 0;
            transform: translateY(12px);
            animation: fadeInUp 0.8s ease-out 0.55s forwards;
        }

        .form-card {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 32px 28px;
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            opacity: 0;
            transform: translateY(16px);
            animation: fadeInUp 0.8s ease-out 0.7s forwards;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group:last-of-type {
            margin-bottom: 24px;
        }

        .signup-toggle {
            display: flex;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 3px;
            margin-bottom: 16px;
        }

        .signup-toggle-btn {
            flex: 1;
            padding: 10px 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 400;
            color: rgba(232, 228, 223, 0.4);
            background: transparent;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: center;
        }

        .signup-toggle-btn.active {
            background: rgba(242, 223, 197, 0.1);
            color: #f2dfc5;
            font-weight: 500;
        }

        .signup-toggle-btn:hover:not(.active) {
            color: rgba(232, 228, 223, 0.6);
        }

        .company-field {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.3s ease, opacity 0.3s ease, margin-bottom 0.3s ease;
            margin-bottom: 0;
        }

        .company-field.visible {
            max-height: 80px;
            opacity: 1;
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(232, 228, 223, 0.4);
            margin-bottom: 8px;
            text-align: left;
        }

        .form-label .optional {
            font-weight: 300;
            letter-spacing: 0.04em;
            text-transform: none;
            color: rgba(232, 228, 223, 0.25);
        }

        .form-input {
            width: 100%;
            padding: 14px 18px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 300;
            color: #e8e4df;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            outline: none;
            transition: border-color 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
            -webkit-appearance: none;
        }

        .form-input::placeholder {
            color: rgba(232, 228, 223, 0.2);
            font-weight: 300;
        }

        .form-input:focus {
            border-color: rgba(242, 223, 197, 0.25);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 0 3px rgba(242, 223, 197, 0.06);
        }

        .form-input.input-error {
            border-color: rgba(220, 100, 100, 0.5);
            box-shadow: 0 0 0 3px rgba(220, 100, 100, 0.08);
        }

        .error-message {
            font-size: 13px;
            font-weight: 400;
            color: #dc6464;
            margin-top: 8px;
            text-align: left;
            min-height: 0;
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.25s ease, max-height 0.25s ease, margin-top 0.25s ease;
        }

        .error-message.visible {
            opacity: 1;
            max-height: 40px;
            margin-top: 8px;
        }

        .submit-btn {
            width: 100%;
            padding: 16px 24px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #0a0a0a;
            background: linear-gradient(135deg, #f2dfc5 0%, #c4b59e 50%, #8b7b67 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.25s ease, box-shadow 0.25s ease, opacity 0.25s ease;
        }

        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 32px rgba(242, 223, 197, 0.15);
        }

        .submit-btn:active {
            transform: translateY(0);
            box-shadow: 0 4px 16px rgba(242, 223, 197, 0.1);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .submit-btn .btn-text {
            display: inline-block;
            transition: opacity 0.2s ease;
        }

        .submit-btn .btn-spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border: 2px solid rgba(10, 10, 10, 0.2);
            border-top-color: #0a0a0a;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .submit-btn.loading .btn-text {
            opacity: 0;
        }

        .submit-btn.loading .btn-spinner {
            opacity: 1;
            animation: spin 0.7s linear infinite;
        }

        .form-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.4s ease;
        }

        .form-wrapper.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .success-state {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 24px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
            z-index: 2;
        }

        .success-state.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .success-icon {
            width: 64px;
            height: 64px;
            margin-bottom: 32px;
            opacity: 0;
            transform: scale(0.8);
            transition: opacity 0.5s ease 0.2s, transform 0.5s ease 0.2s;
        }

        .success-state.visible .success-icon {
            opacity: 1;
            transform: scale(1);
        }

        .success-heading {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 36px;
            font-weight: 300;
            color: #f5f2ee;
            margin-bottom: 16px;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.5s ease 0.35s, transform 0.5s ease 0.35s;
        }

        .success-state.visible .success-heading {
            opacity: 1;
            transform: translateY(0);
        }

        .success-text {
            font-size: 15px;
            font-weight: 300;
            line-height: 1.6;
            color: rgba(232, 228, 223, 0.5);
            max-width: 320px;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.5s ease 0.5s, transform 0.5s ease 0.5s;
        }

        .success-state.visible .success-text {
            opacity: 1;
            transform: translateY(0);
        }

        .footer {
            position: relative;
            z-index: 1;
            margin-top: 64px;
            padding-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 24px;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.9s forwards;
        }

        .footer-link {
            font-size: 13px;
            font-weight: 400;
            color: rgba(232, 228, 223, 0.3);
            text-decoration: none;
            letter-spacing: 0.02em;
            transition: color 0.3s ease;
        }

        .footer-link:hover {
            color: rgba(242, 223, 197, 0.7);
        }

        .footer-divider {
            width: 1px;
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to   { transform: translate(-50%, -50%) rotate(360deg); }
        }

        @media (max-width: 768px) {
            .newsletter-container {
                padding: 32px 20px;
            }

            .wordmark {
                font-size: 24px;
                margin-bottom: 48px;
            }

            .headline {
                font-size: 36px;
            }

            .tagline {
                font-size: 15px;
                margin-bottom: 36px;
            }

            .form-card {
                padding: 24px 20px;
                border-radius: 16px;
            }

            .form-input {
                padding: 13px 16px;
                font-size: 16px;
            }

            .success-heading {
                font-size: 30px;
            }

            .footer {
                margin-top: 48px;
            }
        }

        @media (max-width: 380px) {
            .headline {
                font-size: 30px;
            }

            .tagline {
                font-size: 14px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .wordmark,
            .headline,
            .tagline,
            .form-card,
            .footer {
                opacity: 1;
                transform: none;
                animation: none;
            }

            .success-icon,
            .success-heading,
            .success-text {
                transition: none;
                opacity: 1;
                transform: none;
            }
        }
    </style>
</head>
<body>

    <div class="newsletter-container">

        <!-- Form state -->
        <div class="form-wrapper" id="formWrapper">
            <div class="wordmark">RoweOS</div>

            <h1 class="headline">Get Started with RoweOS</h1>

            <p class="tagline">Your AI operating system for brands and life. Choose your plan and get your access key instantly.</p>

            <div class="form-card">
                <form id="newsletterForm" novalidate>
                    <div class="form-group">
                        <label class="form-label" for="emailInput">Email Address</label>
                        <input
                            type="email"
                            id="emailInput"
                            class="form-input"
                            placeholder="you@example.com"
                            required
                            autocomplete="email"
                            spellcheck="false"
                        >
                        <div class="error-message" id="errorMessage"></div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="nameInput">
                            Name <span class="optional">(optional)</span>
                        </label>
                        <input
                            type="text"
                            id="nameInput"
                            class="form-input"
                            placeholder="First name"
                            autocomplete="given-name"
                        >
                    </div>

                    <div class="signup-toggle" id="signupToggle">
                        <button type="button" class="signup-toggle-btn active" data-type="individual" onclick="setSignupType('individual')">Individual</button>
                        <button type="button" class="signup-toggle-btn" data-type="company" onclick="setSignupType('company')">Company</button>
                    </div>

                    <div class="company-field" id="companyField">
                        <label class="form-label" for="companyInput">Company Name</label>
                        <input
                            type="text"
                            id="companyInput"
                            class="form-input"
                            placeholder="Your company name"
                            autocomplete="organization"
                        >
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn">
                        <span class="btn-text">Get Your Access Key</span>
                        <span class="btn-spinner"></span>
                    </button>
                </form>
            </div>
        </div>

        <!-- Success state -->
        <div class="success-state" id="successState">
            <svg class="success-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="32" cy="32" r="30" stroke="url(#goldGrad)" stroke-width="1.5"/>
                <path d="M20 33L28 41L44 25" stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <defs>
                    <linearGradient id="goldGrad" x1="0" y1="0" x2="64" y2="64">
                        <stop offset="0%" stop-color="#f2dfc5"/>
                        <stop offset="100%" stop-color="#8b7b67"/>
                    </linearGradient>
                </defs>
            </svg>
            <h2 class="success-heading">You're all set</h2>
            <p class="success-text">Check your email for your access key and getting started guide.</p>
        </div>

    </div>

    <div class="footer">
        <a href="/" class="footer-link">Back to RoweOS</a>
        <div class="footer-divider"></div>
        <a href="/newsletter" class="footer-link">Newsletter</a>
    </div>

    <script>
    var _signupType = 'individual';

    function setSignupType(type) {
        _signupType = type;
        var btns = document.querySelectorAll('.signup-toggle-btn');
        for (var i = 0; i < btns.length; i++) {
            if (btns[i].getAttribute('data-type') === type) {
                btns[i].classList.add('active');
            } else {
                btns[i].classList.remove('active');
            }
        }
        var companyField = document.getElementById('companyField');
        if (type === 'company') {
            companyField.classList.add('visible');
        } else {
            companyField.classList.remove('visible');
        }
    }

    (function() {
        var form = document.getElementById('newsletterForm');
        var emailInput = document.getElementById('emailInput');
        var nameInput = document.getElementById('nameInput');
        var companyInput = document.getElementById('companyInput');
        var submitBtn = document.getElementById('submitBtn');
        var errorMessage = document.getElementById('errorMessage');
        var formWrapper = document.getElementById('formWrapper');
        var successState = document.getElementById('successState');
        var successHeading = document.querySelector('.success-heading');
        var successText = document.querySelector('.success-text');

        function isValidEmail(email) {
            var re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        function showError(msg) {
            errorMessage.textContent = msg;
            errorMessage.classList.add('visible');
            emailInput.classList.add('input-error');
        }

        function clearError() {
            errorMessage.classList.remove('visible');
            emailInput.classList.remove('input-error');
        }

        function setLoading(loading) {
            if (loading) {
                submitBtn.classList.add('loading');
                submitBtn.disabled = true;
            } else {
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
            }
        }

        function showSuccess(type) {
            if (type === 'company') {
                if (successHeading) successHeading.textContent = "You're all set";
                if (successText) successText.textContent = "Check your email for your Founder access key and admin setup instructions.";
            } else {
                if (successHeading) successHeading.textContent = "You're all set";
                if (successText) successText.textContent = "Check your email for your access key and getting started guide.";
            }
            formWrapper.classList.add('hidden');
            setTimeout(function() {
                successState.classList.add('visible');
            }, 400);
        }

        emailInput.addEventListener('input', function() {
            if (emailInput.classList.contains('input-error')) {
                clearError();
            }
        });

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            clearError();

            var email = emailInput.value.trim();
            var name = nameInput.value.trim();
            var companyName = companyInput ? companyInput.value.trim() : '';

            if (!email) {
                showError('Please enter your email address.');
                emailInput.focus();
                return;
            }

            if (!isValidEmail(email)) {
                showError('Please enter a valid email address.');
                emailInput.focus();
                return;
            }

            if (_signupType === 'company' && !companyName) {
                showError('Please enter your company name.');
                if (companyInput) companyInput.focus();
                return;
            }

            setLoading(true);

            var payload = JSON.stringify({
                email: email,
                name: name || '',
                source: 'info_page',
                type: _signupType,
                companyName: companyName
            });

            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/newsletter', true);
            xhr.setRequestHeader('Content-Type', 'application/json');

            xhr.onreadystatechange = function() {
                if (xhr.readyState !== 4) return;

                setLoading(false);

                if (xhr.status >= 200 && xhr.status < 300) {
                    showSuccess(_signupType);
                } else {
                    var errorText = 'Something went wrong. Please try again.';
                    try {
                        var resp = JSON.parse(xhr.responseText);
                        if (resp && resp.error) {
                            errorText = resp.error;
                        }
                    } catch (parseErr) {
                        // Use default error text
                    }
                    showError(errorText);
                }
            };

            xhr.onerror = function() {
                setLoading(false);
                showError('Unable to connect. Please check your connection and try again.');
            };

            xhr.send(payload);
        });
    })();
    </script>

</body>
</html>
