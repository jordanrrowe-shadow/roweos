<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Evolve - Brilliance v33.5 / v34</title>
<link href="https://fonts.googleapis.com/css2?family=Old+Standard+TT:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold-1:#f5e6c8; --gold-2:#e2c79b; --gold-3:#c9a961;
  --gold-4:#a88a4a; --gold-5:#6b5a3d;
  --gold-glow:rgba(201,169,97,0.22);
  --b-bg:#0a0a0a; --b-bg-elev:#111111; --b-bg-deep:#060606;
  --b-text:#ece4d8; --b-text-muted:#9e9487; --b-text-dim:#655e54;
  --b-border:rgba(255,255,255,0.08); --b-hairline:rgba(255,255,255,0.05);
  --green:#4ade80; --amber:#f5b042; --red:#ef5350;
}
html,body{background:var(--b-bg);color:var(--b-text);font-family:'DM Sans',sans-serif;font-weight:300;line-height:1.7;min-height:100vh}

/* Top bar */
.bar{position:sticky;top:0;z-index:50;background:rgba(0,0,0,0.85);backdrop-filter:blur(28px);border-bottom:1px solid var(--b-hairline);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:18px}
.bar-left{display:flex;align-items:center;gap:18px;flex:1;min-width:0}
.bar-back{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.22em;text-transform:uppercase;color:var(--b-text-muted);text-decoration:none}
.bar-back:hover{color:var(--gold-2)}
.bar-divider{width:1px;height:18px;background:var(--b-hairline)}
.bar-info{display:flex;flex-direction:column}
.bar-num{font-family:'Old Standard TT',serif;font-style:italic;font-size:11px;color:var(--gold-3);line-height:1}
.bar-name{font-family:'Old Standard TT',serif;font-size:18px;color:var(--b-text);letter-spacing:-0.005em;line-height:1.2}
.bar-name em{color:var(--gold-2);font-style:italic}
.tabs{display:flex;background:rgba(255,255,255,0.04);border:1px solid var(--b-hairline);border-radius:99px;padding:3px}
.tab{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;letter-spacing:0.22em;text-transform:uppercase;background:transparent;border:none;color:var(--b-text-muted);padding:8px 18px;border-radius:99px;cursor:pointer;transition:all 0.25s}
.tab:hover{color:var(--gold-2)}
.tab.active{background:rgba(201,169,97,0.15);color:var(--gold-1)}

/* Stage */
.stage{display:flex;align-items:center;justify-content:center;padding:24px;min-height:calc(100vh - 60px);background:radial-gradient(ellipse at 50% 40%,rgba(201,169,97,0.04),var(--b-bg) 70%)}
.stage-desktop{width:100%;max-width:1280px;height:calc(100vh - 110px);background:var(--b-bg);border:1px solid var(--b-hairline);border-radius:8px;overflow:hidden;box-shadow:0 12px 60px rgba(0,0,0,0.4)}
.stage-mobile{width:380px;height:760px;background:#000;border-radius:46px;padding:14px 12px;box-shadow:0 24px 80px rgba(0,0,0,0.5),inset 0 0 0 2px rgba(255,255,255,0.06);position:relative}
.stage-mobile .phone-screen{width:100%;height:100%;border-radius:34px;overflow:hidden;background:var(--b-bg);position:relative}
.stage-mobile .phone-notch{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:108px;height:30px;background:#000;border-radius:18px;z-index:10;pointer-events:none}

/* Pillar selector */
.pillar-selector{display:flex;gap:6px;flex-wrap:wrap;margin-top:0}
.pillar-btn{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;letter-spacing:0.22em;text-transform:uppercase;background:rgba(255,255,255,0.04);border:1px solid var(--b-hairline);color:var(--b-text-muted);padding:7px 14px;border-radius:99px;cursor:pointer;transition:all 0.25s}
.pillar-btn:hover{color:var(--gold-2);border-color:rgba(201,169,97,0.25)}
.pillar-btn.active{background:rgba(201,169,97,0.10);color:var(--gold-1);border-color:var(--gold-4)}

/* Evolve Layout */
.evolve{height:100%;display:grid;grid-template-columns:240px 1fr;background:#0a0a0a;font-family:'DM Sans',sans-serif}
.evolve-side{background:#080808;border-right:1px solid var(--b-hairline);display:flex;flex-direction:column;overflow:hidden}
.evolve-side-head{padding:24px 22px 18px;border-bottom:1px solid var(--b-hairline)}
.evolve-side-head h2{font-family:'Old Standard TT',serif;font-weight:400;font-size:24px;color:var(--gold-2);letter-spacing:-0.01em;line-height:1}
.evolve-side-head h2 em{font-style:italic;color:var(--gold-1)}
.evolve-side-head .goal{font-size:11px;color:var(--b-text-muted);margin-top:8px;line-height:1.5}
.evolve-side-head .goal strong{color:var(--gold-2);font-weight:500;font-style:italic;font-family:'Old Standard TT',serif}
.evolve-side-head .countdown{margin-top:14px;display:flex;align-items:baseline;gap:6px}
.evolve-side-head .countdown .num{font-family:'Old Standard TT',serif;font-style:italic;font-size:32px;color:var(--gold-1);line-height:1}
.evolve-side-head .countdown .lab{font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--b-text-dim);font-weight:500}
.evolve-side-head .progress{margin-top:14px;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}
.evolve-side-head .progress .fill{height:100%;width:32%;background:linear-gradient(90deg,var(--gold-3),var(--gold-1));border-radius:2px;animation:shimmer 4s ease-in-out infinite}
@keyframes shimmer{0%,100%{opacity:0.85}50%{opacity:1}}
.evolve-side-head .stats{display:flex;justify-content:space-between;margin-top:10px;font-size:10px}
.evolve-side-head .stats .stat{color:var(--b-text-dim);letter-spacing:0.06em}
.evolve-side-head .stats .stat strong{color:var(--gold-2);font-family:'JetBrains Mono',monospace;margin-right:4px;font-weight:500}

.evolve-tabs{padding:14px 12px;display:flex;flex-direction:column;gap:2px;border-bottom:1px solid var(--b-hairline)}
.evolve-tab{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:6px;color:var(--b-text-muted);cursor:pointer;font-size:13px;text-decoration:none;transition:all 0.2s}
.evolve-tab:hover{background:rgba(255,255,255,0.03);color:var(--b-text)}
.evolve-tab.active{background:rgba(201,169,97,0.10);color:var(--gold-2)}
.evolve-tab svg{width:16px;height:16px;flex-shrink:0}
.evolve-tab .badge{margin-left:auto;font-size:9px;color:var(--gold-3);font-family:'JetBrains Mono',monospace;letter-spacing:0;font-variant-numeric:tabular-nums}

.evolve-context{padding:14px 22px;border-top:1px solid var(--b-hairline);font-size:10px;color:var(--b-text-dim);line-height:1.6;letter-spacing:0.04em}
.evolve-context .lab{font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold-3);margin-bottom:6px;font-weight:500}
.evolve-context .ctx{color:var(--b-text-muted);font-family:'Old Standard TT',serif;font-style:italic;font-size:12px;line-height:1.5}

.evolve-main{padding:0;overflow-y:auto;position:relative;display:flex;flex-direction:column}

/* ========== TAB: TODAY (Pulse Dashboard + Liquid Rhythm) ========== */
.evolve-today{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--b-hairline);overflow-y:auto}
.evolve-today-pane{background:#0a0a0a;padding:36px 40px;display:flex;flex-direction:column}
.today-section-tag{font-family:'DM Sans',sans-serif;font-size:9px;font-weight:500;letter-spacing:0.28em;text-transform:uppercase;color:var(--gold-3);margin-bottom:14px}
.today-h{font-family:'Old Standard TT',serif;font-weight:400;font-size:28px;color:var(--b-text);margin-bottom:18px;letter-spacing:-0.01em}
.today-h em{color:var(--gold-2);font-style:italic}

.pomodoro{position:relative;width:160px;height:160px;margin:0 auto 24px;display:flex;align-items:center;justify-content:center}
.pomodoro svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)}
.pomodoro circle.bg{fill:none;stroke:rgba(255,255,255,0.06);stroke-width:3}
.pomodoro circle.fg{fill:none;stroke:url(#pomGrad);stroke-width:3;stroke-dasharray:440;stroke-dashoffset:165;stroke-linecap:round;animation:pomTick 25s linear forwards}
@keyframes pomTick{from{stroke-dashoffset:0}to{stroke-dashoffset:440}}
.pomodoro .pomTime{font-family:'Old Standard TT',serif;font-size:32px;color:var(--gold-1);font-style:italic;letter-spacing:-0.01em}
.pomodoro .pomLab{position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:0.28em;text-transform:uppercase;color:var(--b-text-dim);font-weight:500;font-family:'DM Sans',sans-serif}

.task-list{list-style:none;padding:0;margin:0}
.task-item{display:flex;align-items:flex-start;gap:14px;padding:14px 16px;background:rgba(255,255,255,0.02);border:1px solid var(--b-hairline);border-radius:6px;margin-bottom:10px;cursor:pointer;transition:all 0.2s}
.task-item:hover{background:rgba(201,169,97,0.04);border-color:rgba(201,169,97,0.2)}
.task-item.done{opacity:0.55}
.task-item.done .task-name{text-decoration:line-through;color:var(--b-text-dim)}
.task-checkbox{width:18px;height:18px;border:1px solid var(--gold-5);border-radius:4px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.task-item.done .task-checkbox{background:linear-gradient(135deg,var(--gold-3),var(--gold-5));border-color:var(--gold-3)}
.task-item.done .task-checkbox::after{content:'\2713';color:#000;font-size:11px;font-weight:700}
.task-meta{flex:1}
.task-name{font-family:'Old Standard TT',serif;font-size:15px;color:var(--b-text);line-height:1.4;margin-bottom:4px}
.task-detail{font-size:11px;color:var(--b-text-muted);letter-spacing:0.04em}
.task-detail strong{color:var(--gold-3);font-weight:500}

.recalibrate-card{margin-top:24px;padding:18px 20px;background:linear-gradient(180deg,rgba(201,169,97,0.06),rgba(201,169,97,0.02));border:1px solid var(--gold-5);border-radius:8px;display:flex;align-items:center;gap:16px}
.recal-msg{flex:1;font-size:12px;color:var(--b-text-muted);line-height:1.6}
.recal-msg strong{color:var(--gold-2);font-family:'Old Standard TT',serif;font-style:italic;font-size:14px;display:block;margin-bottom:4px}
.recal-btn{padding:10px 18px;background:linear-gradient(135deg,var(--gold-2),var(--gold-3),var(--gold-4));color:#0a0a0a;border:none;border-radius:99px;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;flex-shrink:0}
.recal-btn:hover{box-shadow:0 8px 28px rgba(201,169,97,0.3)}

.brilli-tutor{position:absolute;top:36px;right:40px;width:60px;height:60px}
.brilli-tutor .orb-shell{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 50% 45%,rgba(245,230,200,0.18) 0%,rgba(201,169,97,0.18) 50%,rgba(168,138,74,0.32) 80%,rgba(107,90,61,0.55) 100%);border:1px solid rgba(232,199,155,0.45);box-shadow:0 0 24px rgba(201,169,97,0.25)}
.brilli-tutor .orb-core{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40%;height:40%;border-radius:50%;background:radial-gradient(circle,#fff8e8,var(--gold-1) 35%,rgba(201,169,97,0.25) 75%,transparent);animation:orbPulse 5s ease-in-out infinite}
@keyframes orbPulse{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.06)}}
.brilli-tutor::before{content:'';position:absolute;inset:-12px;border-radius:50%;background:radial-gradient(circle,rgba(201,169,97,0.25) 0%,transparent 70%);animation:orbPulse 5s ease-in-out infinite}

/* ========== TAB: PRACTICE (Quiz) ========== */
.evolve-practice{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px;background:#0a0a0a;position:relative;overflow-y:auto}
.quiz-card{max-width:720px;width:100%;background:var(--b-bg-elev);border:1px solid var(--b-border);border-radius:10px;padding:36px 40px;box-shadow:0 12px 40px rgba(0,0,0,0.4)}
.quiz-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--b-text-dim);font-family:'DM Sans',sans-serif;font-weight:500}
.quiz-meta .topic{color:var(--gold-3)}
.quiz-meta .diff{display:flex;gap:3px}
.quiz-meta .diff span{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.08)}
.quiz-meta .diff span.on{background:var(--gold-3)}
.quiz-q{font-family:'Old Standard TT',serif;font-size:18px;color:var(--b-text);line-height:1.6;margin-bottom:24px}
.quiz-options{display:flex;flex-direction:column;gap:10px;margin-bottom:0}
.quiz-opt{padding:14px 18px;background:rgba(255,255,255,0.02);border:1px solid var(--b-border);border-radius:6px;color:var(--b-text);font-size:13.5px;line-height:1.5;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;display:flex;align-items:flex-start;gap:14px}
.quiz-opt:hover{border-color:rgba(201,169,97,0.3);background:rgba(201,169,97,0.04)}
.quiz-opt.wrong{border-color:rgba(239,83,80,0.4);background:rgba(239,83,80,0.06)}
.quiz-opt.right{border-color:rgba(74,222,128,0.5);background:rgba(74,222,128,0.06);color:#a3e8c0}
.quiz-opt .letter{font-family:'Old Standard TT',serif;font-style:italic;font-size:14px;color:var(--gold-3);flex-shrink:0;width:20px}
.quiz-opt.right .letter{color:var(--green)}
.quiz-opt.wrong .letter{color:var(--red)}

.why-matrix{margin-top:20px;padding:20px 22px;background:#080808;border:1px solid var(--b-border);border-radius:6px}
.why-matrix .citation{font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold-3);margin-bottom:12px;font-weight:500;font-family:'DM Sans',sans-serif}
.why-matrix .citation a{color:var(--gold-2);text-decoration:none;border-bottom:1px solid var(--gold-5)}
.why-matrix .row{display:flex;gap:14px;padding:10px 0;border-bottom:1px solid var(--b-hairline);font-size:12.5px;line-height:1.6}
.why-matrix .row:last-child{border-bottom:none}
.why-matrix .row .lett{font-family:'Old Standard TT',serif;font-style:italic;font-size:14px;flex-shrink:0;width:18px}
.why-matrix .row.correct .lett{color:var(--green)}
.why-matrix .row.wrong .lett{color:var(--red)}
.why-matrix .row .body{color:var(--b-text-muted)}
.why-matrix .row .body strong{color:var(--b-text);font-weight:500}

.quiz-actions{display:flex;justify-content:space-between;align-items:center;margin-top:24px;padding-top:18px;border-top:1px solid var(--b-hairline);gap:12px}
.quiz-actions .left{display:flex;gap:8px;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--b-text-dim);font-weight:500;align-items:center}
.quiz-actions .left .xp{color:var(--gold-2);font-family:'JetBrains Mono',monospace}
.quiz-actions button{padding:10px 22px;background:transparent;border:1px solid var(--gold-5);color:var(--gold-2);border-radius:99px;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;cursor:pointer;font-weight:500;font-family:'DM Sans',sans-serif}
.quiz-actions button.primary{background:linear-gradient(135deg,var(--gold-2),var(--gold-3),var(--gold-4));color:#0a0a0a;border-color:transparent}

/* ========== TAB: TRANSLATE (Context Translator) ========== */
.evolve-translate{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--b-hairline);overflow:hidden}
.translate-pane{background:#0a0a0a;padding:32px 36px;display:flex;flex-direction:column;overflow-y:auto}
.translate-pane h3{font-family:'Old Standard TT',serif;font-weight:400;font-size:20px;color:var(--b-text);margin-bottom:6px;font-style:italic;letter-spacing:-0.005em}
.translate-pane h3 em{color:var(--gold-2)}
.translate-pane .desc{font-size:12px;color:var(--b-text-muted);margin-bottom:24px;line-height:1.6}
.translate-input{width:100%;padding:14px 16px;background:rgba(255,255,255,0.04);border:1px solid var(--gold-5);border-radius:6px;color:var(--b-text);font-family:'Old Standard TT',serif;font-size:16px;font-style:italic;margin-bottom:18px}
.translate-input::placeholder{color:var(--b-text-dim)}
.translate-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:24px}
.translate-tag{font-family:'DM Sans',sans-serif;font-size:9px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;padding:5px 10px;background:rgba(201,169,97,0.06);color:var(--gold-2);border-radius:99px;cursor:pointer}
.translate-known{background:rgba(255,255,255,0.04);border:1px solid var(--b-border);border-radius:8px;padding:18px;margin-top:auto}
.translate-known .lab{font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold-3);margin-bottom:8px;font-weight:500}
.translate-known .item{font-family:'Old Standard TT',serif;font-style:italic;font-size:14px;color:var(--b-text);padding:6px 0;border-bottom:1px solid var(--b-hairline);display:flex;justify-content:space-between;align-items:center}
.translate-known .item:last-child{border-bottom:none}
.translate-known .item .when{font-style:normal;font-family:'DM Sans',sans-serif;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--b-text-dim);font-weight:500}

.translate-output{background:#0d0d0d}
.translate-matrix{margin-top:18px}
.matrix-row{display:grid;grid-template-columns:140px 1fr;gap:14px;padding:14px 0;border-bottom:1px solid var(--b-hairline);font-size:12.5px}
.matrix-row:last-child{border-bottom:none}
.matrix-row .key{font-family:'DM Sans',sans-serif;font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold-3);font-weight:500;line-height:1.6}
.matrix-row .val{font-family:'Old Standard TT',serif;font-size:14px;color:var(--b-text);line-height:1.55}
.matrix-row .val em{color:var(--gold-2);font-style:italic}
.matrix-row .val .competitor{display:flex;flex-direction:column;gap:6px;margin-top:4px}
.matrix-row .val .competitor span{font-family:'DM Sans',sans-serif;font-style:normal;font-size:12px;color:var(--b-text-muted)}
.matrix-row .val .competitor span strong{color:var(--gold-2);font-weight:500;margin-right:8px}
.save-btn{margin-top:18px;width:100%;padding:12px 16px;background:rgba(201,169,97,0.08);border:1px solid var(--gold-4);color:var(--gold-1);border-radius:8px;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;cursor:pointer;font-weight:500;font-family:'DM Sans',sans-serif}
.save-btn:hover{background:rgba(201,169,97,0.14)}

/* ========== TAB: VERIFY (Peer-Review) ========== */
.evolve-verify{flex:1;background:#0a0a0a;padding:48px;overflow-y:auto;display:flex;flex-direction:column;align-items:center}
.verify-shell{max-width:760px;width:100%}
.verify-input-wrap{margin-bottom:32px}
.verify-input-wrap label{display:block;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold-3);margin-bottom:10px;font-weight:500;font-family:'DM Sans',sans-serif}
.verify-input{width:100%;min-height:120px;padding:18px 20px;background:rgba(255,255,255,0.03);border:1px solid var(--b-border);border-radius:8px;color:var(--b-text);font-family:'Old Standard TT',serif;font-size:15px;line-height:1.7;resize:vertical}
.verify-input::placeholder{color:var(--b-text-dim);font-style:italic}
.verify-submit{margin-top:14px;padding:12px 28px;background:linear-gradient(135deg,var(--gold-2),var(--gold-3),var(--gold-4));color:#0a0a0a;border:none;border-radius:99px;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;cursor:pointer;font-weight:500;font-family:'DM Sans',sans-serif}
.verify-result{background:#080808;border:1px solid var(--b-border);border-radius:10px;padding:32px;margin-top:18px;position:relative}
.verify-badge{position:absolute;top:-12px;left:32px;display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:linear-gradient(135deg,#4ade80,#22a861);color:#0a1a0e;border-radius:99px;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;font-weight:600;font-family:'DM Sans',sans-serif;box-shadow:0 6px 20px rgba(74,222,128,0.3)}
.verify-badge::before{content:'\2713';font-size:11px;font-weight:700}
.verify-body{margin-top:8px;font-family:'Old Standard TT',serif;font-size:15px;line-height:1.75;color:var(--b-text)}
.verify-body p{margin-bottom:14px}
.verify-body strong{color:var(--gold-2);font-weight:500}
.verify-cites{margin-top:24px;padding-top:18px;border-top:1px solid var(--b-hairline)}
.verify-cites .lab{font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold-3);margin-bottom:10px;font-weight:500;font-family:'DM Sans',sans-serif}
.verify-cite{display:flex;justify-content:space-between;padding:8px 0;font-size:12px;color:var(--b-text-muted);font-family:'DM Sans',sans-serif;border-bottom:1px solid var(--b-hairline)}
.verify-cite:last-child{border-bottom:none}

    <span class="skill-name">Tachycardia algorithms</span>
    <span class="skill-meta">Level i</span>
  </div>

  <div style="position:absolute;left:24px;bottom:24px;font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--b-text-dim);font-weight:500">14 active skills &middot; 9 sources read &middot; 23 reflections &middot; 6 verified briefs</div>
</div>`;
}

function renderEvolve(activePillar){
  let main = '';
  switch(activePillar){
    case 'today': main = todayPane(); break;
    case 'practice': main = practicePane(); break;
    case 'translate': main = translatePane(); break;
    case 'verify': main = verifyPane(); break;
    case 'library': main = libraryPane(); break;
    default: main = todayPane();
  }
  return `<div class="evolve">${evolveSidebar(activePillar)}<main class="evolve-main">${main}</main></div>`;
}

(function(){
  let active = 'today';

  function refresh(){
    document.getElementById('stageDesktop').innerHTML = renderEvolve(active);
    document.getElementById('stageMobileInner').innerHTML = renderEvolve(active);

    document.querySelectorAll('.pillar-btn').forEach(b=>b.classList.toggle('active', b.dataset.pillar===active));

    document.querySelectorAll('.evolve-tab').forEach(t=>{
      t.addEventListener('click', e=>{
        e.preventDefault();
        active = t.dataset.pillar;
        refresh();
      });
    });
  }

  document.querySelectorAll('.pillar-btn').forEach(b=>{
    b.addEventListener('click', ()=>{
      active = b.dataset.pillar;
      refresh();
    });
  });

  document.querySelectorAll('.tabs .tab').forEach(t=>{
    t.addEventListener('click', ()=>{
      document.querySelectorAll('.tabs .tab').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      const m = t.dataset.mode;
      document.getElementById('stageDesktop').style.display = m==='desktop'?'block':'none';
      document.getElementById('stageMobile').style.display = m==='mobile'?'block':'none';
    });
  });

  refresh();
})();
</script>
