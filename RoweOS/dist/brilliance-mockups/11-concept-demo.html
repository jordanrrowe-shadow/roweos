<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Concept Demo - Brilliance v33</title>
<link href="https://fonts.googleapis.com/css2?family=Old+Standard+TT:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold-1:#f5e6c8; --gold-2:#e2c79b; --gold-3:#c9a961;
  --gold-4:#a88a4a; --gold-5:#6b5a3d;
  --gold-glow:rgba(201,169,97,0.22);
  --b-bg:#0a0a0a; --b-bg-elev:#111111; --b-bg-deep:#060606;
  --b-text:#ece4d8; --b-text-muted:#9e9487; --b-text-dim:#655e54;
  --b-border:rgba(255,255,255,0.08); --b-hairline:rgba(255,255,255,0.05);
  --paper:#ece4d8; --paper-text:#3a2c1e; --paper-ink:#5a4520;
}
html,body{background:var(--b-bg);color:var(--b-text);font-family:'DM Sans',sans-serif;font-weight:300;line-height:1.7;min-height:100vh}

/* ===== Top bar ===== */
.bar{
  position:sticky;top:0;z-index:50;
  background:rgba(0,0,0,0.85);backdrop-filter:blur(28px);
  border-bottom:1px solid var(--b-hairline);
  padding:14px 24px;
  display:flex;align-items:center;justify-content:space-between;gap:18px;
}
.bar-left{display:flex;align-items:center;gap:18px;flex:1;min-width:0}
.bar-back{
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;
  letter-spacing:0.22em;text-transform:uppercase;color:var(--b-text-muted);
  text-decoration:none;display:inline-flex;align-items:center;gap:6px;
}
.bar-back:hover{color:var(--gold-2)}
.bar-divider{width:1px;height:18px;background:var(--b-hairline)}
.bar-info{display:flex;flex-direction:column;min-width:0;flex:1}
.bar-num{font-family:'Old Standard TT',serif;font-style:italic;font-size:11px;color:var(--gold-3);line-height:1}
.bar-name{font-family:'Old Standard TT',serif;font-size:18px;color:var(--b-text);letter-spacing:-0.005em;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-name em{color:var(--gold-2);font-style:italic}

.tabs{display:flex;gap:0;background:rgba(255,255,255,0.04);border:1px solid var(--b-hairline);border-radius:99px;padding:3px}
.tab{
  font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;
  letter-spacing:0.22em;text-transform:uppercase;
  background:transparent;border:none;color:var(--b-text-muted);
  padding:8px 18px;border-radius:99px;cursor:pointer;
  transition:all 0.25s;
}
.tab:hover{color:var(--gold-2)}
.tab.active{background:rgba(201,169,97,0.15);color:var(--gold-1)}

.bar-arrows{display:flex;gap:4px}
.bar-arrow{
  width:32px;height:32px;background:rgba(255,255,255,0.04);border:1px solid var(--b-hairline);
  border-radius:50%;color:var(--b-text-muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:14px;
  transition:all 0.25s;text-decoration:none;
}
.bar-arrow:hover{color:var(--gold-2);border-color:rgba(201,169,97,0.3)}

/* ===== Stage ===== */
.stage{
  display:flex;align-items:center;justify-content:center;
  padding:24px;
  min-height:calc(100vh - 60px);
  background:radial-gradient(ellipse at 50% 40%,rgba(201,169,97,0.04),var(--b-bg) 70%);
}
.stage-desktop{
  width:100%;max-width:1280px;
  height:calc(100vh - 110px);
  background:var(--b-bg);
  border:1px solid var(--b-hairline);
  border-radius:8px;
  overflow:hidden;
  box-shadow:0 12px 60px rgba(0,0,0,0.4);
  position:relative;
}
.stage-mobile{
  width:380px;height:760px;
  background:#000;
  border-radius:46px;
  padding:14px 12px;
  box-shadow:0 24px 80px rgba(0,0,0,0.5),inset 0 0 0 2px rgba(255,255,255,0.06);
  position:relative;
}
.stage-mobile .phone-screen{
  width:100%;height:100%;
  border-radius:34px;
  overflow:hidden;
  background:var(--b-bg);
  position:relative;
}
.stage-mobile .phone-notch{
  position:absolute;top:14px;left:50%;
  transform:translateX(-50%);
  width:108px;height:30px;
  background:#000;border-radius:18px;
  z-index:10;pointer-events:none;
}

/* Concept descriptor band */
.descriptor{
  max-width:1280px;margin:0 auto 16px;
  padding:18px 28px;
  background:rgba(201,169,97,0.04);
  border:1px solid var(--b-border);
  border-radius:8px;
  font-size:13px;line-height:1.7;color:var(--b-text-muted);
}
.descriptor strong{color:var(--gold-2);font-weight:500}

/* ===== A1 Living Document ===== */
.viz-a1{height:100%;display:flex;flex-direction:column;background:#0a0a0a;font-family:'Old Standard TT',serif;color:var(--b-text)}
.viz-a1-doc{flex:1;overflow-y:auto;padding:48px 64px 32px;max-width:780px;margin:0 auto;width:100%}
.viz-a1-h{font-style:italic;font-size:24px;color:var(--gold-2);margin:36px 0 14px;line-height:1.3}
.viz-a1-h:first-child{margin-top:0}
.viz-a1-p{font-size:17px;line-height:1.85;color:var(--b-text);margin-bottom:16px;font-weight:400}
.viz-a1-p em{color:var(--gold-3);font-style:italic}
.viz-a1-marg{position:absolute;width:6px;height:6px;border-radius:50%;background:var(--gold-2);box-shadow:0 0 8px var(--gold-3);left:30px;animation:pulse2 2s ease-in-out infinite}
@keyframes pulse2{0%,100%{opacity:0.5;transform:scale(0.85)}50%{opacity:1;transform:scale(1.1)}}
.viz-a1-input{
  border-top:1px solid var(--b-hairline);
  padding:18px 64px;background:rgba(0,0,0,0.4);backdrop-filter:blur(18px);
  display:flex;align-items:center;gap:14px;max-width:780px;margin:0 auto;width:100%;
  font-family:'Old Standard TT',serif;font-style:italic;font-size:16px;color:var(--b-text-dim);
}
.viz-a1-input::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--gold-3);box-shadow:0 0 6px var(--gold-3);flex-shrink:0;animation:pulse2 2s ease-in-out infinite}
.viz-a1-input::after{content:'|';color:var(--gold-2);animation:caret 1s infinite;font-style:normal}
@keyframes caret{0%,100%{opacity:1}50%{opacity:0}}

/* ===== A2 Letter Series ===== */
.viz-a2{height:100%;background:#15110c;display:flex;flex-direction:column;padding:32px;overflow-y:auto}
.viz-a2-letter{
  background:#ece4d8;color:#3a2c1e;
  padding:48px 56px;margin:0 auto 24px;max-width:680px;width:100%;
  border-radius:2px;box-shadow:0 8px 32px rgba(0,0,0,0.45);position:relative;
  font-family:'Old Standard TT',serif;
}
.viz-a2-letter::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(168,138,74,0.06),transparent 70%);pointer-events:none}
.viz-a2-meta{font-size:11px;color:#a88a4a;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:12px;font-family:'DM Sans',sans-serif;font-weight:500}
.viz-a2-initial{font-size:64px;float:left;line-height:0.85;color:#a88a4a;margin:8px 12px 0 0;font-style:italic;font-weight:400}
.viz-a2-body{font-size:15px;line-height:1.7;color:#5a4520}
.viz-a2-seal{position:absolute;bottom:24px;right:32px;width:48px;height:48px;border-radius:50%;background:radial-gradient(circle,#c9a961,#6b5a3d);box-shadow:0 0 28px rgba(201,169,97,0.5);display:flex;align-items:center;justify-content:center;font-family:'Old Standard TT',serif;font-style:italic;color:#2a1f10;font-size:20px;animation:sealFloat 4s ease-in-out infinite}
@keyframes sealFloat{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
.viz-a2-input{
  background:rgba(0,0,0,0.3);backdrop-filter:blur(20px);
  border-top:1px solid rgba(168,138,74,0.2);
  padding:18px 32px;font-family:'Old Standard TT',serif;font-style:italic;font-size:15px;color:#9e9487;
  display:flex;align-items:center;gap:12px;
}
.viz-a2-input::before{content:'\271C';color:#a88a4a;font-style:normal;font-size:18px}

/* ===== A3 Magazine Column ===== */
.viz-a3{height:100%;background:#0a0a0a;padding:36px 48px;font-family:'Old Standard TT',serif;color:var(--b-text);overflow-y:auto}
.viz-a3-masthead{font-size:32px;color:var(--gold-2);margin-bottom:8px;letter-spacing:-0.01em}
.viz-a3-masthead em{font-style:italic}
.viz-a3-issue{font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:var(--b-text-dim);margin-bottom:36px;padding-bottom:14px;border-bottom:1px solid var(--b-hairline)}
.viz-a3-cols{column-count:2;column-gap:36px;column-rule:1px solid var(--b-hairline);font-size:14px;line-height:1.75;color:var(--b-text-muted)}
.viz-a3-cols h4{font-size:18px;color:var(--gold-2);margin:0 0 12px;font-style:italic;break-after:avoid}
.viz-a3-cols p{margin:0 0 14px}
.viz-a3-pull{font-size:22px;color:var(--gold-2);font-style:italic;margin:18px 0;padding:14px 0;border-top:1px solid var(--gold-5);border-bottom:1px solid var(--gold-5);line-height:1.4;break-inside:avoid}
.viz-a3-input{
  position:absolute;bottom:0;left:0;right:0;
  background:rgba(0,0,0,0.85);backdrop-filter:blur(18px);
  border-top:1px solid var(--b-hairline);padding:18px 48px;
  font-family:'DM Sans',sans-serif;font-size:13px;color:var(--b-text-dim);
}

/* ===== A4 Margin Notes ===== */
.viz-a4{height:100%;background:#0a0a0a;display:grid;grid-template-columns:1fr 2fr 1fr;gap:1px;background-color:var(--b-hairline);overflow:hidden}
.viz-a4-pane{background:#0a0a0a;padding:32px 24px;overflow-y:auto;font-family:'Old Standard TT',serif;font-size:14px;line-height:1.7;color:var(--b-text-muted)}
.viz-a4-pane.center{background:#0d0d0d;font-size:18px;color:var(--gold-2);font-style:italic;display:flex;flex-direction:column}
.viz-a4-pane.center .msg{font-size:18px;color:var(--gold-2);font-style:italic;margin-bottom:14px;padding:12px 16px;border-left:1px solid var(--gold-5);background:rgba(201,169,97,0.04)}
.viz-a4-pane.center .input{margin-top:auto;padding-top:18px;border-top:1px solid var(--b-hairline);font-size:14px;color:var(--b-text-dim);font-family:'DM Sans',sans-serif;font-style:normal}
.viz-a4-tag{font-family:'DM Sans',sans-serif;font-size:9px;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold-3);margin-bottom:10px;font-weight:500;font-style:normal;display:block}

/* ===== B1 Constellation ===== */
.viz-b1{height:100%;background:radial-gradient(ellipse at 50% 50%,rgba(201,169,97,0.05),#0a0a0a 70%);position:relative;overflow:hidden}
.viz-b1 svg.lines{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.viz-b1 .nodepoint{position:absolute;width:14px;height:14px;border-radius:50%;background:radial-gradient(circle,#fff8e8,rgba(201,169,97,0.4) 60%,transparent);transform:translate(-50%,-50%);animation:tw 3s ease-in-out infinite;cursor:pointer}
.viz-b1 .nodepoint.big{width:22px;height:22px}
.viz-b1 .nodelabel{position:absolute;font-family:'Old Standard TT',serif;font-style:italic;font-size:13px;color:var(--gold-2);transform:translate(-50%,-200%);white-space:nowrap;text-shadow:0 0 12px rgba(0,0,0,0.6)}
.viz-b1 .nodelabel.muted{font-size:11px;color:var(--b-text-muted);transform:translate(-50%,-180%)}
@keyframes tw{0%,100%{opacity:0.65;transform:translate(-50%,-50%) scale(0.92)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}}
.viz-b1-input{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);backdrop-filter:blur(20px);border:1px solid var(--gold-5);border-radius:99px;padding:12px 22px;font-family:'Old Standard TT',serif;font-style:italic;font-size:14px;color:var(--b-text-dim);min-width:280px;text-align:center}

/* ===== B2 Pinboard ===== */
.viz-b2{height:100%;background:#0a0a0a;background-image:radial-gradient(rgba(255,255,255,0.04) 1px,transparent 1px);background-size:18px 18px;position:relative;overflow:hidden}
.viz-b2 svg.threads{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.viz-b2 .pcard{position:absolute;background:rgba(20,18,14,0.95);border:1px solid var(--b-border);border-radius:6px;padding:14px;font-size:12px;line-height:1.55;color:var(--b-text);box-shadow:0 8px 24px rgba(0,0,0,0.5);width:200px;cursor:move;font-family:'DM Sans',sans-serif}
.viz-b2 .pcard.gold{border-color:var(--gold-5);background:rgba(201,169,97,0.07)}
.viz-b2 .pcard .ptag{font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold-3);margin-bottom:6px;font-weight:500}
.viz-b2 .pcard .pin{position:absolute;top:-5px;left:50%;transform:translateX(-50%);width:10px;height:10px;border-radius:50%;background:radial-gradient(circle,#fff8e8,#a88a4a);box-shadow:0 2px 6px rgba(0,0,0,0.6),0 0 8px var(--gold-3)}
.viz-b2-input{position:absolute;bottom:20px;right:20px;background:rgba(0,0,0,0.85);backdrop-filter:blur(20px);border:1px solid var(--gold-5);border-radius:8px;padding:14px 18px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--b-text-dim);min-width:280px}

/* ===== B3 Time Ribbon ===== */
.viz-b3{height:100%;background:#0a0a0a;display:flex;flex-direction:column;padding:24px 32px}
.viz-b3-now{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px}
.viz-b3-now .tag{font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:0.32em;text-transform:uppercase;color:var(--gold-3);margin-bottom:18px;font-weight:500}
.viz-b3-now .quote{font-family:'Old Standard TT',serif;font-size:28px;color:var(--gold-2);font-style:italic;line-height:1.4;max-width:560px;margin-bottom:18px}
.viz-b3-now .meta{font-size:13px;color:var(--b-text-muted);font-family:'DM Sans',sans-serif}
.viz-b3-track{position:relative;height:80px;margin-top:24px;padding:24px 32px}
.viz-b3-track::before{content:'';position:absolute;left:32px;right:32px;top:50%;height:1px;background:linear-gradient(90deg,transparent,var(--gold-4) 10%,var(--gold-3) 70%,transparent)}
.viz-b3-marker{position:absolute;top:calc(50% - 8px);width:1px;height:16px;background:var(--gold-3)}
.viz-b3-marker .lbl{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-family:'DM Sans',sans-serif;font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--b-text-dim);white-space:nowrap}
.viz-b3-marker.now{height:24px;top:calc(50% - 12px);background:var(--gold-1);box-shadow:0 0 14px var(--gold-3)}
.viz-b3-marker.now .lbl{color:var(--gold-2);font-weight:500}

/* ===== C1 Concierge ===== */
.viz-c1{height:100%;background:linear-gradient(180deg,#15110c,#0a0a0a);display:flex;flex-direction:column;padding:48px 64px;font-family:'DM Sans',sans-serif}
.viz-c1-greeting{font-family:'Old Standard TT',serif;font-style:italic;font-size:28px;color:var(--gold-2);margin-bottom:36px}
.viz-c1-status{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:32px;max-width:760px}
.viz-c1-row{padding:16px 18px;background:rgba(255,255,255,0.03);border:1px solid var(--b-border);border-radius:6px}
.viz-c1-row .lab{font-size:9px;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold-3);margin-bottom:6px;font-weight:500}
.viz-c1-row .val{font-family:'Old Standard TT',serif;font-size:16px;color:var(--b-text);line-height:1.4}
.viz-c1-row .val em{color:var(--gold-2);font-style:italic}
.viz-c1-input{margin-top:auto;background:rgba(255,255,255,0.04);border:1px solid var(--gold-5);border-radius:99px;padding:16px 24px;font-size:14px;color:var(--b-text-dim);display:flex;align-items:center;gap:12px;max-width:760px}
.viz-c1-input::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--gold-3);box-shadow:0 0 8px var(--gold-3);flex-shrink:0;animation:pulse2 2s ease-in-out infinite}

/* ===== C2 Studio ===== */
.viz-c2{height:100%;background:#0a0a0a;display:grid;grid-template-columns:80px 1fr 320px;gap:1px;background-color:var(--b-hairline)}
.viz-c2-tools{background:#080808;display:flex;flex-direction:column;padding:18px 0;align-items:center;gap:8px}
.viz-c2-tools .t{width:48px;height:48px;background:rgba(255,255,255,0.04);border:1px solid var(--b-hairline);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--gold-3);font-family:'Old Standard TT',serif;font-style:italic;font-size:18px;cursor:pointer;transition:all 0.25s}
.viz-c2-tools .t:hover{border-color:var(--gold-5);color:var(--gold-2)}
.viz-c2-tools .t.active{background:rgba(201,169,97,0.08);border-color:var(--gold-4);color:var(--gold-1)}
.viz-c2-easel{background:#0d0d0d;display:flex;align-items:center;justify-content:center;padding:32px;position:relative}
.viz-c2-canvas{width:75%;max-width:640px;height:80%;background:linear-gradient(180deg,rgba(232,199,155,0.04),rgba(168,138,74,0.02));border:1px solid var(--gold-5);border-radius:6px;padding:36px;font-family:'Old Standard TT',serif;color:var(--b-text);font-size:15px;line-height:1.8;overflow-y:auto;position:relative}
.viz-c2-canvas h3{font-size:18px;color:var(--gold-2);margin-bottom:14px;font-style:italic}
.viz-c2-chat{background:#080808;display:flex;flex-direction:column;padding:24px}
.viz-c2-chat .who{font-family:'DM Sans',sans-serif;font-size:9px;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold-3);margin-bottom:6px;font-weight:500}
.viz-c2-chat .msg{font-family:'Old Standard TT',serif;font-size:14px;color:var(--b-text);margin-bottom:18px;line-height:1.6}
.viz-c2-chat .msg em{color:var(--gold-2);font-style:italic}
.viz-c2-chat .input{margin-top:auto;background:rgba(255,255,255,0.04);border:1px solid var(--b-border);border-radius:8px;padding:12px 14px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--b-text-dim)}

/* ===== D1 Split-Pane ===== */
.viz-d1{height:100%;background:#0a0a0a;display:grid;grid-template-columns:1fr 1fr;position:relative}
.viz-d1-pane{padding:32px 36px;overflow-y:auto;display:flex;flex-direction:column}
.viz-d1-left{background:linear-gradient(180deg,#0a0a0a,#0d0d0d);border-right:1px solid var(--b-hairline)}
.viz-d1-right{background:#080808}
.viz-d1-pane h5{font-family:'DM Sans',sans-serif;font-size:9px;letter-spacing:0.28em;text-transform:uppercase;color:var(--gold-3);margin-bottom:18px;font-weight:500}
.viz-d1-msg{margin-bottom:18px}
.viz-d1-msg .who{font-family:'DM Sans',sans-serif;font-size:9px;letter-spacing:0.25em;text-transform:uppercase;color:var(--b-text-dim);margin-bottom:4px;font-weight:500}
.viz-d1-msg .body{font-family:'Old Standard TT',serif;font-size:15px;color:var(--b-text);line-height:1.65}
.viz-d1-msg.user .body{color:var(--gold-2);font-style:italic}
.viz-d1-input{margin-top:auto;background:rgba(255,255,255,0.04);border:1px solid var(--b-border);border-radius:99px;padding:12px 18px;font-size:13px;color:var(--b-text-dim);font-family:'DM Sans',sans-serif}
.viz-d1-stream{background:rgba(232,199,155,0.04);border:1px solid var(--gold-5);border-radius:6px;padding:24px;flex:1}
.viz-d1-stream-title{font-family:'Old Standard TT',serif;font-style:italic;font-size:18px;color:var(--gold-2);margin-bottom:12px}
.viz-d1-stream-line{height:9px;background:linear-gradient(90deg,var(--gold-3) 30%,var(--gold-5) 70%,transparent);margin:6px 0;border-radius:2px;animation:streamP 2s ease-in-out infinite}
.viz-d1-stream-line:nth-child(2){width:90%;animation-delay:0.2s}
.viz-d1-stream-line:nth-child(3){width:78%;animation-delay:0.4s}
.viz-d1-stream-line:nth-child(4){width:88%;animation-delay:0.6s}
.viz-d1-stream-line:nth-child(5){width:62%;animation-delay:0.8s}
.viz-d1-stream-line:nth-child(6){width:42%;animation-delay:1s}
@keyframes streamP{0%,100%{opacity:0.55}50%{opacity:1}}
