<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0a0a0a;--surface:rgba(255,255,255,0.03);--surface-2:#111;--border:rgba(255,255,255,0.08);--border-strong:rgba(255,255,255,0.12);
--text:#ece4d8;--text-muted:#9e9487;--text-dim:#655e54;
--gold-1:#f2dfc5;--gold-2:#c4a882;--gold-3:#b2997b;--gold-4:#8b7b67;--gold-5:#6b5d4d;
--serif:'Cormorant Garamond',serif;--sans:'DM Sans',sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden;min-height:100vh}
.top-bar{padding:14px 0;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;background:rgba(10,10,10,0.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px)}
.top-bar-inner{display:flex;align-items:center;justify-content:space-between;max-width:1200px;margin:0 auto;padding:0 24px}
.top-bar-left{display:flex;align-items:center;gap:16px}
.top-bar-logo{height:26px;opacity:0.85}
.top-bar-divider{width:1px;height:18px;background:var(--border-strong)}
.top-bar-title{font-size:13px;color:var(--text-muted);letter-spacing:0.06em}
.top-bar-right{display:flex;align-items:center;gap:12px}
.top-bar-link{font-size:12px;color:var(--text-muted);text-decoration:none;letter-spacing:0.04em;transition:color 0.3s;padding:8px 16px;border:1px solid var(--border);border-radius:6px}
.top-bar-link:hover{color:var(--gold-2);border-color:var(--gold-4)}
.hero{padding:64px 24px 48px;text-align:center;position:relative}
.hero::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(178,153,123,0.05) 0%,transparent 65%);pointer-events:none}
.hero-label{font-size:11px;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold-4);margin-bottom:12px;position:relative}
.hero h1{font-family:var(--serif);font-size:clamp(32px,5vw,52px);font-weight:300;margin-bottom:14px;position:relative}
.hero p{font-size:15px;color:var(--text-muted);max-width:520px;margin:0 auto;line-height:1.7;position:relative}
.filters{display:flex;justify-content:center;gap:6px;padding:0 24px 40px;flex-wrap:wrap}
.filter-btn{padding:8px 18px;border:1px solid var(--border);background:transparent;color:var(--text-dim);border-radius:20px;font-family:var(--sans);font-size:12px;cursor:pointer;transition:all 0.25s;letter-spacing:0.02em}
.filter-btn:hover{border-color:var(--gold-4);color:var(--text-muted)}
.filter-btn.active{background:rgba(178,153,123,0.12);border-color:var(--gold-4);color:var(--gold-2)}
.grid{max-width:1200px;margin:0 auto;padding:0 24px 80px;display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px}
.video-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:all 0.35s}
.video-card:hover{border-color:rgba(178,153,123,0.25);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,0.2)}
.video-thumb{position:relative;aspect-ratio:16/9;background:var(--surface-2);overflow:hidden;cursor:pointer}
.video-thumb img{width:100%;height:100%;object-fit:cover;opacity:0.85;transition:opacity 0.3s}
.video-card:hover .video-thumb img{opacity:1}
.duration{position:absolute;bottom:10px;right:10px;padding:3px 10px;background:rgba(0,0,0,0.7);border-radius:4px;font-size:11px;color:#fff;font-weight:500;letter-spacing:0.04em;backdrop-filter:blur(4px)}
.cat-badge{position:absolute;top:10px;left:10px;padding:4px 12px;border-radius:16px;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;font-weight:500;backdrop-filter:blur(8px)}
.cat-badge.core{background:rgba(178,153,123,0.2);color:var(--gold-1);border:1px solid rgba(178,153,123,0.2)}
.cat-badge.studio{background:rgba(164,130,246,0.15);color:#a78bfa;border:1px solid rgba(164,130,246,0.2)}
.cat-badge.brand{background:rgba(244,114,182,0.15);color:#f472b6;border:1px solid rgba(244,114,182,0.2)}
.cat-badge.productivity{background:rgba(74,222,128,0.12);color:#4ade80;border:1px solid rgba(74,222,128,0.2)}
.cat-badge.automation{background:rgba(251,191,36,0.15);color:#fbbf24;border:1px solid rgba(251,191,36,0.2)}
.cat-badge.media{background:rgba(59,130,246,0.15);color:#3b82f6;border:1px solid rgba(59,130,246,0.2)}
.cat-badge.settings{background:rgba(255,255,255,0.08);color:var(--text-muted);border:1px solid var(--border)}
.video-info{padding:18px 20px 20px}
.video-title{font-family:var(--serif);font-size:18px;font-weight:400;margin-bottom:6px}
.video-desc{font-size:13px;color:var(--text-muted);line-height:1.6}

/* Action row */
.card-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.card-action-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border:1px solid var(--border);background:transparent;color:var(--text-dim);border-radius:6px;font-family:var(--sans);font-size:11px;cursor:pointer;transition:all 0.25s;letter-spacing:0.02em}
.card-action-btn:hover{border-color:var(--gold-4);color:var(--gold-2)}
.card-action-btn.primary{background:rgba(178,153,123,0.1);border-color:rgba(178,153,123,0.2);color:var(--gold-2)}
.card-action-btn.primary:hover{background:rgba(178,153,123,0.18)}
.card-action-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}

/* Prompt panel (hidden by default) */
.prompt-panel{display:none;padding:0 20px 20px}
.prompt-panel.open{display:block}
.prompt-section{margin-bottom:16px}
.prompt-label{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold-4);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.prompt-copy{font-size:10px;color:var(--text-dim);cursor:pointer;text-transform:none;letter-spacing:0.02em;transition:color 0.2s}
.prompt-copy:hover{color:var(--gold-2)}
.prompt-copy.copied{color:var(--gold-2)}
.prompt-text{font-size:12px;color:var(--text-muted);line-height:1.7;padding:12px 14px;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:8px;white-space:pre-wrap;word-break:break-word;font-family:var(--sans);cursor:text;user-select:all}
.prompt-divider{height:1px;background:var(--border);margin:16px 0}

/* Recording script */
.script-text{font-size:12px;color:var(--text-dim);line-height:1.7;padding:12px 14px;background:rgba(178,153,123,0.04);border:1px solid rgba(178,153,123,0.1);border-radius:8px;font-style:italic}

/* Video modal */
.video-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;background:rgba(0,0,0,0.9);backdrop-filter:blur(12px);justify-content:center;align-items:center;padding:24px}
.video-modal.open{display:flex}
.video-modal-inner{position:relative;max-width:900px;width:100%;border-radius:14px;overflow:hidden;background:#000;box-shadow:0 24px 80px rgba(0,0,0,0.5)}
.video-modal video{width:100%;display:block;border-radius:14px}
.video-modal-close{position:absolute;top:-44px;right:0;width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,0.15);background:rgba(0,0,0,0.4);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:all 0.2s}
.video-modal-close:hover{background:rgba(255,255,255,0.1)}
.video-modal-title{color:#fff;font-family:var(--serif);font-size:20px;font-weight:300;text-align:center;margin-top:16px}
.footer{padding:40px 24px;border-top:1px solid var(--border);text-align:center}
.footer-links{display:flex;justify-content:center;gap:20px;margin-bottom:12px}
.footer a{font-size:12px;color:var(--text-dim);text-decoration:none;transition:color 0.3s}
.footer a:hover{color:var(--gold-2)}
.footer-copy{font-size:11px;color:var(--text-dim)}
@media(max-width:768px){
  .grid{grid-template-columns:1fr;gap:14px}
  .filters{gap:4px;padding:0 16px 24px}
  .filter-btn{padding:6px 12px;font-size:11px}
  .top-bar-link{display:none}
  .top-bar-divider{display:none}
  .card-actions{gap:6px}
  .card-action-btn{padding:6px 10px;font-size:10px}
}
</style>
</head>
<body>

<div class="top-bar-inner">

<div class="footer">

<script>
var demos = [
  { id:1, title:'Login & Mode Selection', desc:'Welcome screen with BrandAI and LifeAI mode cards, brand portfolio at a glance.', cat:'core', duration:'0:20', img:'/images/desktop/login_dark.png',video:'',
    script:'Open roweos.com > welcome screen loads > hover over BrandAI card > click it > brands appear at bottom > click back > hover over LifeAI > click it > profile loads',
    narration:'Write a 20-second voiceover script for a product demo showing a login screen with two mode cards: BrandAI (business intelligence) and LifeAI (personal coaching). The tone is calm, confident, premium. End with "One platform. Two intelligences." Keep it under 50 words.',
    social:'Write a social media caption (under 200 characters) for a short video showing RoweOS\'s dual-mode login screen \u2014 BrandAI for business, LifeAI for personal life. Include a CTA to roweos.com. No hashtags.',
    veo:'Cinematic reveal of a dark luxury interface. Two glowing cards appear side by side \u2014 one warm gold, one cool blue. Camera slowly pushes in. Minimal, elegant, tech product aesthetic. 8 seconds.' },

  { id:2, title:'BrandAI Chat', desc:'Conversational AI with specialized agents. Strategy, Marketing, Operations, Documents.', cat:'core', duration:'0:30', img:'/images/desktop/chat_brandAI.png',video:'',
    script:'Open Chat > Strategy agent selected > type "What should our Q2 focus be?" > streaming response appears > mid-response, switch to Marketing agent dropdown > show different agent colors',

  { id:3, title:'LifeAI Chat', desc:'Personal coaching with Life Coach, Wellness, Tax Copilot, and more.', cat:'core', duration:'0:30', img:'/images/desktop/LifeAI_example_chat.png',video:'',

    narration:'Write a 30-second voiceover for a demo showing LifeAI \u2014 the personal intelligence side of RoweOS. A Life Coach agent responds to a personal growth question with warmth and structure. Contrast it with the business focus of BrandAI. Under 70 words.',
    social:'Write a caption for a video showing LifeAI\'s personal coaching in RoweOS. Life Coach, Wellness, Tax Copilot \u2014 AI that knows your goals. Under 200 characters with CTA.',

  { id:4, title:'Dark & Light Mode', desc:'Full theme system. One toggle, every view transforms.', cat:'core', duration:'0:10', img:'/images/desktop/light_brandAI.png',video:'',

    narration:'Write a 10-second voiceover for a quick theme toggle demo. Dark mode (default, luxury feel) to light mode (clean, daytime) and back. One sentence, punchy. Under 20 words.',
    social:'Write a short caption for a satisfying dark-to-light mode toggle video. Emphasize the design quality. Under 150 characters.',
    veo:'Split-screen transition from dark mode to light mode on a premium app interface. Smooth, satisfying color shift. Gold accents on both sides. Elegant motion design. 6 seconds.' },

  { id:5, title:'Studio Operations', desc:'Run any of 50+ operations. Content, strategy, social, documents \u2014 all AI-powered.', cat:'studio', duration:'0:30', img:'/images/desktop/studi_brandAI.png',video:'',
    script:'Open Studio > scroll through operation list > pick "Brand Strategy Brief" > hit Run Agent > output streams in with markdown formatting > scroll through the result',
    narration:'Write a 30-second voiceover for a demo of RoweOS Studio. 50+ built-in operations across content, strategy, social media, and documents. User picks an operation, hits Run, and gets a full deliverable in seconds. Tone: capable, efficient. Under 70 words.',
    social:'Write a caption for a video showing RoweOS Studio running an AI operation and generating a full brand strategy brief in seconds. 50+ operations. Under 200 characters.',
    veo:'Fast-paced montage of a content creation interface \u2014 text generating rapidly, formatted documents appearing, charts and lists populating. Dark interface with gold highlights. Professional, energetic. 8 seconds.' },

  { id:6, title:'Studio Output Actions', desc:'Copy, export to PDF/DOCX, email with branded template, or edit inline.', cat:'studio', duration:'0:40', img:'/images/desktop/studi_brandAI.png',video:'',

    veo:'Sequence of action icons appearing and activating \u2014 copy, download, email envelope, print \u2014 each lighting up with a gold pulse on a dark interface. Quick, satisfying micro-interactions. 6 seconds.' },

  { id:7, title:'Email Composer', desc:'Send branded emails directly from Studio. 4 templates, WYSIWYG editor, CC/BCC.', cat:'studio', duration:'0:45', img:'/images/desktop/studi_brandAI.png',video:'',
    script:'Click Email in Studio action bar > composer opens > show Professional template with brand logo > switch to Bold template > switch to Newsletter > fill in To field > add CC > click Send > success toast',
    narration:'Write a 45-second voiceover for the RoweOS email composer. Run any Studio operation, click Email, and the output is wrapped in a branded template with your logo and colors. Four templates: Professional, Minimal, Bold, Newsletter. Full WYSIWYG editor, CC/BCC, send via Resend. Under 100 words.',

  { id:8, title:'Brand Identity', desc:'Define voice, audience, strategy, tagline, and visual identity with precision.', cat:'brand', duration:'0:30', img:'/images/desktop/idenitity_brandAI.png',video:'',

  { id:9, title:'Multi-Brand Switching', desc:'Switch brands instantly. Colors, logo, and agent context all update.', cat:'brand', duration:'0:20', img:'/images/desktop/idenitity_brandAI.png',video:'',
    script:'Click brand selector dropdown > show 5 brands listed > switch from TRC to Solo > watch accent color change > logo updates > sidebar updates > switch to Retreats',
    narration:'Write a 20-second voiceover showing instant brand switching in RoweOS. One click switches the entire platform \u2014 colors, logo, agent context, memory \u2014 to a different brand. Manage a portfolio, not just a profile. Under 45 words.',
    social:'Write a caption for a video showing multi-brand switching in RoweOS. 5 brands, one platform, instant context switch. Under 180 characters.',
    veo:'Color palette morphing smoothly from warm gold to cool blue to forest green as interface elements transition \u2014 logo swapping, accent colors shifting. Fluid, satisfying brand switch. 6 seconds.' },

  { id:10, title:'Share Brand Config', desc:'Generate a join link to share your brand setup with team members.', cat:'brand', duration:'0:20', img:'/images/desktop/idenitity_brandAI.png',video:'',
    script:'Click Share button in Identity header > modal opens > generate link > show the join code > copy link',
    narration:'Write a 20-second voiceover for sharing brand configurations. Generate a join link that shares your entire brand setup \u2014 voice, strategy, agents, colors \u2014 with team members. They join with one click. Under 45 words.',
    social:'Write a caption about sharing brand configs via join link in RoweOS. One link, entire brand setup transferred. Under 180 characters.',
    veo:'A share icon expanding into a link that connects two devices, brand elements flowing through the connection. Collaborative, connected feel. Gold on dark. 6 seconds.' },

  { id:11, title:'Focus Dashboard', desc:'Daily command center. Tasks, categories, drag-to-reorder, and completion tracking.', cat:'productivity', duration:'0:25', img:'/images/desktop/focus_brandAI.png',video:'',
    script:'Open Focus > show task cards > drag a task to reorder > check off a completed task > show categories widget > show the unified daily view',

function renderDemos(filter) {
  var grid = document.getElementById('demoGrid');
  grid.innerHTML = '';
  demos.forEach(function(d) {
    if (filter !== 'all' && d.cat !== filter) return;
    var hasVideo = d.video && d.video.length > 0;
    var card = document.createElement('div');
    card.className = 'video-card';
    card.id = 'demo-' + d.id;

    card.innerHTML = '<div class="video-thumb" onclick="' + (hasVideo ? 'playVideo(\'' + d.video + '\',\'' + d.title.replace(/'/g,"\\'") + '\')' : '') + '">'
      + '<img src="' + d.img + '" alt="' + d.title + '" loading="lazy">'
      + '<span class="duration">' + d.duration + '</span>'
      + '<span class="cat-badge ' + d.cat + '">' + d.cat + '</span>'
      + '</div>'
      + '<div class="video-info">'
      + '<div class="video-title">' + d.title + '</div>'
      + '<div class="video-desc">' + d.desc + '</div>'
      + '<div class="card-actions">'
      + '<button class="card-action-btn primary" onclick="downloadImg(' + d.id + ')">'
      + '<svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>'
      + 'Download Image</button>'
      + '<button class="card-action-btn" onclick="togglePrompts(' + d.id + ')">'
      + '<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>'
      + 'Prompts</button>'
      + '</div>'
      + '</div>'
      + '<div class="prompt-panel" id="prompts-' + d.id + '">'
      + '<div class="prompt-section">'
      + '<div class="prompt-label">Recording Script <span class="prompt-copy" onclick="copyPrompt(this,\'script-' + d.id + '\')">Copy</span></div>'
      + '<div class="script-text" id="script-' + d.id + '">' + escHtml(d.script) + '</div>'
      + '</div>'
      + '<div class="prompt-divider"></div>'
      + '<div class="prompt-section">'
      + '<div class="prompt-label">Narration Prompt <span class="prompt-copy" onclick="copyPrompt(this,\'narration-' + d.id + '\')">Copy</span></div>'
      + '<div class="prompt-text" id="narration-' + d.id + '">' + escHtml(d.narration) + '</div>'
      + '</div>'
      + '<div class="prompt-section">'
      + '<div class="prompt-label">Social Caption Prompt <span class="prompt-copy" onclick="copyPrompt(this,\'social-' + d.id + '\')">Copy</span></div>'
      + '<div class="prompt-text" id="social-' + d.id + '">' + escHtml(d.social) + '</div>'
      + '</div>'
      + '<div class="prompt-section">'
      + '<div class="prompt-label">Veo Video Prompt <span class="prompt-copy" onclick="copyPrompt(this,\'veo-' + d.id + '\')">Copy</span></div>'
      + '<div class="prompt-text" id="veo-' + d.id + '">' + escHtml(d.veo) + '</div>'
      + '</div>'
      + '</div>';
    grid.appendChild(card);
  });
}

function escHtml(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function togglePrompts(id) {
  var panel = document.getElementById('prompts-' + id);
  if (!panel) return;
  panel.classList.toggle('open');
  var card = document.getElementById('demo-' + id);
  if (panel.classList.contains('open') && card) {
    setTimeout(function() { card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 100);
  }
}

function copyPrompt(btn, elId) {
  var el = document.getElementById(elId);
  if (!el) return;
  var text = el.textContent || el.innerText;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function() {
      btn.textContent = 'Copied';
      btn.classList.add('copied');
      setTimeout(function() { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
    });
  }
}

function downloadImg(id) {
  var demo = demos.find(function(d) { return d.id === id; });
  if (!demo) return;
  var a = document.createElement('a');
  a.href = demo.img;
  a.download = 'roweos-' + demo.title.toLowerCase().replace(/[^a-z0-9]+/g, '-') + '.png';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function filterDemos(cat) {
  var btns = document.querySelectorAll('.filter-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.remove('active');
    if (btns[i].textContent.toLowerCase() === cat || (cat === 'all' && btns[i].textContent === 'All')) {
      btns[i].classList.add('active');
    }
  }
  renderDemos(cat);
}

function playVideo(src, title) {
  var modal = document.getElementById('videoModal');
  var player = document.getElementById('videoPlayer');
  var titleEl = document.getElementById('videoModalTitle');
  player.src = src;
  titleEl.textContent = title;
  modal.classList.add('open');
  player.play();
}

function closeVideo() {
  var modal = document.getElementById('videoModal');
  var player = document.getElementById('videoPlayer');
  player.pause();
  player.src = '';
  modal.classList.remove('open');
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeVideo();
});

renderDemos('all');
</script>
