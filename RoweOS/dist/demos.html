<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoweOS — Feature Demos</title>
<meta name="description" content="Watch RoweOS in action. Short demos of every feature — AI agents, Studio, automations, social publishing, and more.">
<meta property="og:title" content="RoweOS — Feature Demos">
<meta property="og:description" content="Watch RoweOS in action. Short demos of every feature.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://roweos.com/demos">
<meta property="og:image" content="https://roweos.com/logo.png">
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0a0a0a;--surface:rgba(255,255,255,0.03);--surface-2:#111;--border:rgba(255,255,255,0.08);--border-strong:rgba(255,255,255,0.12);
--text:#ece4d8;--text-muted:#9e9487;--text-dim:#655e54;
--gold-1:#f2dfc5;--gold-2:#c4a882;--gold-3:#b2997b;--gold-4:#8b7b67;--gold-5:#6b5d4d;
--serif:'Cormorant Garamond',serif;--sans:'DM Sans',sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden;min-height:100vh}

/* Top bar */
.top-bar{padding:14px 0;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;background:rgba(10,10,10,0.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px)}
.top-bar-inner{display:flex;align-items:center;justify-content:space-between;max-width:1200px;margin:0 auto;padding:0 24px}
.top-bar-left{display:flex;align-items:center;gap:16px}
.top-bar-logo{height:26px;opacity:0.85}
.top-bar-divider{width:1px;height:18px;background:var(--border-strong)}
.top-bar-title{font-family:var(--sans);font-size:13px;color:var(--text-muted);letter-spacing:0.06em;font-weight:400}
.top-bar-right{display:flex;align-items:center;gap:12px}
.top-bar-link{font-size:12px;color:var(--text-muted);text-decoration:none;letter-spacing:0.04em;transition:color 0.3s;padding:8px 16px;border:1px solid var(--border);border-radius:6px}
.top-bar-link:hover{color:var(--gold-2);border-color:var(--gold-4)}

/* Hero */
.hero{padding:64px 24px 48px;text-align:center;position:relative}
.hero::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(178,153,123,0.05) 0%,transparent 65%);pointer-events:none}
.hero-label{font-size:11px;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold-4);margin-bottom:12px;position:relative}
.hero h1{font-family:var(--serif);font-size:clamp(32px,5vw,52px);font-weight:300;margin-bottom:14px;position:relative}
.hero p{font-size:15px;color:var(--text-muted);max-width:520px;margin:0 auto;line-height:1.7;position:relative}

/* Filter tabs */
.filters{display:flex;justify-content:center;gap:6px;padding:0 24px 40px;flex-wrap:wrap}
.filter-btn{padding:8px 18px;border:1px solid var(--border);background:transparent;color:var(--text-dim);border-radius:20px;font-family:var(--sans);font-size:12px;cursor:pointer;transition:all 0.25s;letter-spacing:0.02em}
.filter-btn:hover{border-color:var(--gold-4);color:var(--text-muted)}
.filter-btn.active{background:rgba(178,153,123,0.12);border-color:var(--gold-4);color:var(--gold-2)}

/* Grid */
.grid{max-width:1200px;margin:0 auto;padding:0 24px 80px;display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px}

/* Video card */
.video-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:all 0.35s;cursor:pointer}
.video-card:hover{border-color:rgba(178,153,123,0.25);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,0.2)}
.video-card.hidden{display:none}

.video-thumb{position:relative;aspect-ratio:16/9;background:var(--surface-2);overflow:hidden}
.video-thumb img{width:100%;height:100%;object-fit:cover;opacity:0.85;transition:opacity 0.3s}
.video-card:hover .video-thumb img{opacity:1}

/* Play button overlay */
.play-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:56px;height:56px;border-radius:50%;background:rgba(0,0,0,0.6);border:1.5px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;transition:all 0.3s;backdrop-filter:blur(8px)}
.video-card:hover .play-btn{background:rgba(178,153,123,0.3);border-color:rgba(178,153,123,0.4);transform:translate(-50%,-50%) scale(1.08)}
.play-btn svg{width:20px;height:20px;fill:#fff;margin-left:3px}

/* Duration badge */
.duration{position:absolute;bottom:10px;right:10px;padding:3px 10px;background:rgba(0,0,0,0.7);border-radius:4px;font-size:11px;color:#fff;font-weight:500;letter-spacing:0.04em;backdrop-filter:blur(4px)}

/* Category badge */
.cat-badge{position:absolute;top:10px;left:10px;padding:4px 12px;border-radius:16px;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;font-weight:500;backdrop-filter:blur(8px)}
.cat-badge.core{background:rgba(178,153,123,0.2);color:var(--gold-1);border:1px solid rgba(178,153,123,0.2)}
.cat-badge.studio{background:rgba(164,130,246,0.15);color:#a78bfa;border:1px solid rgba(164,130,246,0.2)}
.cat-badge.brand{background:rgba(244,114,182,0.15);color:#f472b6;border:1px solid rgba(244,114,182,0.2)}
.cat-badge.productivity{background:rgba(74,222,128,0.12);color:#4ade80;border:1px solid rgba(74,222,128,0.2)}
.cat-badge.automation{background:rgba(251,191,36,0.15);color:#fbbf24;border:1px solid rgba(251,191,36,0.2)}
.cat-badge.media{background:rgba(59,130,246,0.15);color:#3b82f6;border:1px solid rgba(59,130,246,0.2)}
.cat-badge.settings{background:rgba(255,255,255,0.08);color:var(--text-muted);border:1px solid var(--border)}

.video-info{padding:18px 20px 20px}
.video-title{font-family:var(--serif);font-size:18px;font-weight:400;margin-bottom:6px}
.video-desc{font-size:13px;color:var(--text-muted);line-height:1.6}
.video-status{display:inline-block;margin-top:10px;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-dim);padding:4px 10px;border:1px solid var(--border);border-radius:4px}

/* Coming soon overlay */
.coming-soon .video-thumb::after{content:'Coming Soon';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:13px;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold-2);z-index:3}
.coming-soon .play-btn{display:none}
.coming-soon .video-thumb img{opacity:0.3}

/* Modal for video playback */
.video-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;background:rgba(0,0,0,0.9);backdrop-filter:blur(12px);justify-content:center;align-items:center;padding:24px}
.video-modal.open{display:flex}
.video-modal-inner{position:relative;max-width:900px;width:100%;border-radius:14px;overflow:hidden;background:#000;box-shadow:0 24px 80px rgba(0,0,0,0.5)}
.video-modal video{width:100%;display:block;border-radius:14px}
.video-modal-close{position:absolute;top:-44px;right:0;width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,0.15);background:rgba(0,0,0,0.4);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:all 0.2s}
.video-modal-close:hover{background:rgba(255,255,255,0.1)}
.video-modal-title{color:#fff;font-family:var(--serif);font-size:20px;font-weight:300;text-align:center;margin-top:16px}

/* Footer */
.footer{padding:40px 24px;border-top:1px solid var(--border);text-align:center}
.footer-links{display:flex;justify-content:center;gap:20px;margin-bottom:12px}
.footer a{font-size:12px;color:var(--text-dim);text-decoration:none;transition:color 0.3s}
.footer a:hover{color:var(--gold-2)}
.footer-copy{font-size:11px;color:var(--text-dim)}

/* Responsive */
@media(max-width:768px){
  .grid{grid-template-columns:1fr;gap:14px}
  .filters{gap:4px;padding:0 16px 24px}
  .filter-btn{padding:6px 12px;font-size:11px}
  .top-bar-link{display:none}
  .top-bar-divider{display:none}
}
@media(max-width:480px){
  .grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="top-bar">
<div class="top-bar-inner">
<div class="top-bar-left">
<img class="top-bar-logo" src="/images/logo-full.png" alt="RoweOS">
<div class="top-bar-divider"></div>
<span class="top-bar-title">Demos</span>
</div>
<div class="top-bar-right">
<a href="/" class="top-bar-link">Launch RoweOS</a>
<a href="/newsletter" class="top-bar-link">Newsletter</a>
</div>
</div>
</div>

<div class="hero">
<div class="hero-label">Feature Demos</div>
<h1>See RoweOS in action</h1>
<p>Short walkthroughs of every feature. From AI agents to branded emails, social publishing to video generation.</p>
</div>

<div class="filters">
<button class="filter-btn active" onclick="filterDemos('all')">All</button>
<button class="filter-btn" onclick="filterDemos('core')">Core</button>
<button class="filter-btn" onclick="filterDemos('studio')">Studio</button>
<button class="filter-btn" onclick="filterDemos('brand')">Brand</button>
<button class="filter-btn" onclick="filterDemos('productivity')">Productivity</button>
<button class="filter-btn" onclick="filterDemos('automation')">Automation</button>
<button class="filter-btn" onclick="filterDemos('media')">Media</button>
<button class="filter-btn" onclick="filterDemos('settings')">Settings</button>
</div>

<div class="grid" id="demoGrid"></div>

<!-- Video playback modal -->
<div class="video-modal" id="videoModal" onclick="if(event.target===this)closeVideo()">
<div class="video-modal-inner">
<button class="video-modal-close" onclick="closeVideo()">&times;</button>
<video id="videoPlayer" controls></video>
<div class="video-modal-title" id="videoModalTitle"></div>
</div>
</div>

<div class="footer">
<div class="footer-links">
<a href="/">RoweOS</a>
<a href="/info">Learn More</a>
<a href="/newsletter">Newsletter</a>
<a href="/social">Content Studio</a>
<a href="/privacy">Privacy</a>
</div>
<div class="footer-copy">The Rowe Collection, LLC</div>
</div>

<script>
var demos = [
  // Core Experience
  { id: 1, title: 'Login & Mode Selection', desc: 'Welcome screen with BrandAI and LifeAI mode cards, brand portfolio at a glance.', cat: 'core', duration: '0:20', img: '/images/desktop/login_dark.png', video: '' },
  { id: 2, title: 'BrandAI Chat', desc: 'Conversational AI with specialized agents. Strategy, Marketing, Operations, Documents.', cat: 'core', duration: '0:30', img: '/images/desktop/chat_brandAI.png', video: '' },
  { id: 3, title: 'LifeAI Chat', desc: 'Personal coaching with Life Coach, Wellness, Tax Copilot, and more.', cat: 'core', duration: '0:30', img: '/images/desktop/LifeAI_example_chat.png', video: '' },
  { id: 4, title: 'Dark & Light Mode', desc: 'Full theme system. One toggle, every view transforms.', cat: 'core', duration: '0:10', img: '/images/desktop/light_brandAI.png', video: '' },

  // Studio & Output
  { id: 5, title: 'Studio Operations', desc: 'Run any of 50+ operations. Content, strategy, social, documents \u2014 all AI-powered.', cat: 'studio', duration: '0:30', img: '/images/desktop/studi_brandAI.png', video: '' },
  { id: 6, title: 'Studio Output Actions', desc: 'Copy, export to PDF/DOCX, email with branded template, or edit inline.', cat: 'studio', duration: '0:40', img: '/images/desktop/studi_brandAI.png', video: '' },
  { id: 7, title: 'Email Composer', desc: 'Send branded emails directly from Studio. 4 templates, WYSIWYG editor, CC/BCC.', cat: 'studio', duration: '0:45', img: '/images/desktop/studi_brandAI.png', video: '' },

  // Brand & Identity
  { id: 8, title: 'Brand Identity', desc: 'Define voice, audience, strategy, tagline, and visual identity with precision.', cat: 'brand', duration: '0:30', img: '/images/desktop/idenitity_brandAI.png', video: '' },
  { id: 9, title: 'Multi-Brand Switching', desc: 'Switch brands instantly. Colors, logo, and agent context all update.', cat: 'brand', duration: '0:20', img: '/images/desktop/idenitity_brandAI.png', video: '' },
  { id: 10, title: 'Share Brand Config', desc: 'Generate a join link to share your brand setup with team members.', cat: 'brand', duration: '0:20', img: '/images/desktop/idenitity_brandAI.png', video: '' },

  // Productivity
  { id: 11, title: 'Focus Dashboard', desc: 'Daily command center. Tasks, categories, drag-to-reorder, and completion tracking.', cat: 'productivity', duration: '0:25', img: '/images/desktop/focus_brandAI.png', video: '' },
  { id: 12, title: 'Pulse Goal Tracking', desc: 'Set goals, track milestones, and visualize momentum across brand and life.', cat: 'productivity', duration: '0:25', img: '/images/desktop/pulse_brandAI.png', video: '' },
  { id: 13, title: 'Rhythm Planner', desc: 'Intelligent daily scheduling with routine blocks and time management.', cat: 'productivity', duration: '0:30', img: '/images/desktop/focus_brandAI.png', video: '' },

  // Automation & Publishing
  { id: 14, title: 'Create Automation', desc: 'Build scheduled workflows. Pick action, set recurrence, assign brand.', cat: 'automation', duration: '0:40', img: '/images/desktop/adaptive_brandAI.png', video: '' },
  { id: 15, title: 'Pipeline Builder', desc: 'Chain multi-step operations. Generate \u2192 refine \u2192 post, all automated.', cat: 'automation', duration: '0:45', img: '/images/desktop/adaptive_brandAI.png', video: '' },
  { id: 16, title: 'Social Posting', desc: 'Post to X, Instagram, and Threads with AI content and generated images.', cat: 'automation', duration: '0:30', img: '/images/desktop/adaptive_brandAI.png', video: '' },

  // Media Generation
  { id: 17, title: 'Image Generation', desc: 'Generate images with Nano Banana (Gemini Imagen) and DALL-E, right inside RoweOS.', cat: 'media', duration: '0:30', img: '/images/desktop/studi_brandAI.png', video: '' },
  { id: 18, title: 'Video Generation', desc: 'AI video with Google Veo. Multiple models, custom duration, text-to-video.', cat: 'media', duration: '0:45', img: '/images/desktop/studi_brandAI.png', video: '' },

  // Data & Settings
  { id: 19, title: 'Library', desc: 'Organized storage with folders, favorites, cross-brand search, and export.', cat: 'settings', duration: '0:25', img: '/images/desktop/library_brandAI.png', video: '' },
  { id: 20, title: 'Analytics & API Costs', desc: 'Provider breakdown, model comparison, cost tracking, and cache hit rates.', cat: 'settings', duration: '0:25', img: '/images/desktop/analytics_brandAI.png', video: '' },
  { id: 21, title: 'Settings & Customization', desc: 'API providers, response caching, web search, auto-pilot, and theme controls.', cat: 'settings', duration: '0:30', img: '/images/desktop/settings_brandAI.png', video: '' }
];

function renderDemos(filter) {
  var grid = document.getElementById('demoGrid');
  grid.innerHTML = '';
  demos.forEach(function(d) {
    if (filter !== 'all' && d.cat !== filter) return;
    var hasVideo = d.video && d.video.length > 0;
    var card = document.createElement('div');
    card.className = 'video-card' + (hasVideo ? '' : ' coming-soon');
    if (hasVideo) {
      card.onclick = function() { playVideo(d.video, d.title); };
    }
    card.innerHTML = '<div class="video-thumb">'
      + '<img src="' + d.img + '" alt="' + d.title + '" loading="lazy">'
      + (hasVideo ? '<div class="play-btn"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>' : '')
      + '<span class="duration">' + d.duration + '</span>'
      + '<span class="cat-badge ' + d.cat + '">' + d.cat + '</span>'
      + '</div>'
      + '<div class="video-info">'
      + '<div class="video-title">' + d.title + '</div>'
      + '<div class="video-desc">' + d.desc + '</div>'
      + (hasVideo ? '' : '<span class="video-status">Coming Soon</span>')
      + '</div>';
    grid.appendChild(card);
  });
}

function filterDemos(cat) {
  var btns = document.querySelectorAll('.filter-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.remove('active');
    if (btns[i].textContent.toLowerCase() === cat || (cat === 'all' && btns[i].textContent === 'All')) {
      btns[i].classList.add('active');
    }
  }
  renderDemos(cat);
}

function playVideo(src, title) {
  var modal = document.getElementById('videoModal');
  var player = document.getElementById('videoPlayer');
  var titleEl = document.getElementById('videoModalTitle');
  player.src = src;
  titleEl.textContent = title;
  modal.classList.add('open');
  player.play();
}

function closeVideo() {
  var modal = document.getElementById('videoModal');
  var player = document.getElementById('videoPlayer');
  player.pause();
  player.src = '';
  modal.classList.remove('open');
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeVideo();
});

renderDemos('all');
</script>

</body>
</html>
