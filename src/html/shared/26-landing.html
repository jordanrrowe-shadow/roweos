
  <!-- v21.0: Floating feedback button removed - accessible via System > Feedback -->

  <!-- v26.0: Section Landing Page View -->
  <div id="sectionLandingView" class="panel-view hidden">
    <div class="panel">
      <div class="section-breadcrumb breadcrumb"></div>
      <div id="sectionLandingContent"></div>
    </div>
  </div>

  <!-- v2.50.0 MODALS AND OVERLAYS -->
  
  <!-- Add Brand Modal -->
  <div id="addBrandModal" class="modal-overlay" style="display: none;">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">
          <svg class="svg-icon-lg" viewBox="0 0 24 24">
            <path d="M12 4v16m8-8H4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <span id="addBrandModalTitle">Add New Brand</span>
        </div>
        <button class="modal-close" onclick="closeModal('addBrandModal')">
          <svg class="svg-icon" viewBox="0 0 24 24">
            <path d="M6 18L18 6M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <!-- Choice Section -->
        <div style="margin-bottom: var(--space-6); padding: var(--space-4); background: rgba(212, 175, 55, 0.05); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: var(--radius-md);">
          <div style="font-size: var(--text-base); color: var(--text-secondary); margin-bottom: var(--space-3);">Start by choosing an option:</div>
          <div style="display: flex; gap: var(--space-3);">
            <button type="button" id="chooseTemplateBtn" class="modal-button-secondary" onclick="showTemplateChoice()" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: var(--space-2);">
              <svg style="width: 16px; height: 16px; flex-shrink: 0;" viewBox="0 0 24 24" fill="none">
                <path d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z" stroke="currentColor" stroke-width="2"/>
              </svg>
              <span>Choose BrandAI Template</span>
            </button>
            <button type="button" id="createOwnBtn" class="modal-button-primary" onclick="showCreateOwn()" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: var(--space-2);">
              <svg style="width: 16px; height: 16px; flex-shrink: 0;" viewBox="0 0 24 24" fill="none">
                <path d="M12 4v16m8-8H4" stroke="currentColor" stroke-width="2"/>
              </svg>
              <span>Create Your Own BrandAI</span>
            </button>
          </div>
        </div>
        
        <!-- Template Selection (hidden by default) -->
        <div id="templateSection" style="display: none;">
          <div class="modal-form-group">
            <label class="modal-label">Select a BrandAI Template</label>
            <div class="template-grid" id="brandTemplateGrid">
              <div class="template-card" onclick="selectTemplate('blank')">
                <div class="template-icon">◇</div>
                <div class="template-name">Blank</div>
                <div class="template-desc">Start from scratch</div>
              </div>
              <div class="template-card" onclick="selectTemplate('luxury')">
                <div class="template-icon">◆</div>
                <div class="template-name">Luxury</div>
                <div class="template-desc">Premium brand</div>
              </div>
              <div class="template-card" onclick="selectTemplate('tech')">
                <div class="template-icon">▣</div>
                <div class="template-name">Tech</div>
                <div class="template-desc">Technology brand</div>
              </div>
              <div class="template-card" onclick="selectTemplate('wellness')">
                <div class="template-icon">○</div>
                <div class="template-name">Wellness</div>
                <div class="template-desc">Health & wellness</div>
              </div>
              <div class="template-card" onclick="selectTemplate('retail')">
                <div class="template-icon">▢</div>
                <div class="template-name">Retail</div>
                <div class="template-desc">Retail business</div>
              </div>
              <div class="template-card" onclick="selectTemplate('service')">
                <div class="template-icon">◈</div>
                <div class="template-name">Service</div>
                <div class="template-desc">Service business</div>
              </div>
            </div>
          </div>
          <div class="modal-form-group">
            <label class="modal-label">Brand Name *</label>
            <input type="text" id="newBrandName" class="modal-input" placeholder="Enter brand name">
          </div>
        </div>
        
        <!-- Create Own Section (hidden by default) -->
        <div id="createOwnSection" style="display: none;">
          <div class="modal-form-group">
            <label class="modal-label">Brand Name *</label>
            <input type="text" id="newBrandName2" class="modal-input" placeholder="Enter brand name">
          </div>
          <div class="modal-form-group">
            <label class="modal-label">Tagline</label>
            <input type="text" id="newBrandTagline" class="modal-input" placeholder="Enter brand tagline">
          </div>
          <div class="modal-form-group">
            <label class="modal-label">Philosophy</label>
            <textarea id="newBrandPhilosophy" class="modal-textarea" placeholder="Describe your brand philosophy"></textarea>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="modal-button-secondary" onclick="closeModal('addBrandModal')">Cancel</button>
        <button class="modal-button-primary" onclick="createNewBrand()">Create Brand</button>
      </div>
    </div>
  </div>

  <!-- v20.7: Tier Picker Modal -->
  <div id="tierPickerModal" class="modal-overlay" style="display: none;">
    <div class="modal" style="max-width: 640px;">
      <div class="modal-header">
        <div class="modal-title">
          <svg class="svg-icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
          Choose Your Plan
        </div>
        <button class="modal-close" onclick="closeModal('tierPickerModal')">&times;</button>
      </div>
      <div class="modal-body" style="padding:20px;">
        <div id="tierPickerCards" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;"></div>
        <div id="tierPickerNote" style="font-size:11px;color:var(--text-muted);text-align:center;margin-top:16px;"></div>
      </div>
    </div>
  </div>
