

      <!-- v10.5.25: Inventory View - Enhanced with Images -->
      <div id="inventoryView" class="panel-view hidden">
        <div class="panel">
          <!-- Breadcrumb Trail -->
          <div class="breadcrumb">
            <span class="breadcrumb-item"><a href="#" onclick="showView('agent'); return false;">Home</a></span>
            <span class="breadcrumb-item active" id="inventoryBreadcrumbLabel">Inventory</span>
          </div>

          <div class="panel-header" style="margin-bottom: var(--space-2);display:flex;align-items:center;">
            <span id="inventoryHeaderTitle">Inventory</span>
            <button class="section-help-btn" onclick="showSectionHelp('inventory')" title="How to use Inventory">?</button>
          </div>
          <p style="color: var(--text-muted); font-size: 13px; margin-bottom: var(--space-5); line-height: 1.5;">Products, services, and pricing for your brands.</p>
          <div style="display: flex; justify-content: flex-end; gap: var(--space-2); align-items: center; flex-wrap: wrap; margin-bottom: var(--space-4);" id="inventoryControls">
              <input type="text" id="inventorySearch" placeholder="Search inventory..."
                style="padding: 8px 12px; border-radius: var(--radius-md); border: 1px solid #444; background: #1a1a1a; color: #f4f4f5; font-size: var(--text-base); width: 180px; height: 38px;"
                oninput="filterInventory(this.value)">
              <select id="inventoryFilter" 
                style="padding: 8px 12px; border-radius: var(--radius-md); border: 1px solid #444; background: #1a1a1a; color: #f4f4f5; font-size: var(--text-base); height: 38px; min-width: 110px;"
                onchange="filterInventoryByType(this.value)">
                <option value="all">All Types</option>
                <option value="product">Products</option>
                <option value="service">Services</option>
              </select>
              <select id="inventorySort"
                style="padding: 8px 12px; border-radius: var(--radius-md); border: 1px solid #444; background: #1a1a1a; color: #f4f4f5; font-size: var(--text-base); height: 38px; min-width: 110px;"
                onchange="sortInventory(this.value)">
                <option value="default">Sort: Default</option>
                <option value="name-asc">Name A→Z</option>
                <option value="name-desc">Name Z→A</option>
                <option value="price-low">Price: Low→High</option>
                <option value="price-high">Price: High→Low</option>
                <option value="newest">Newest First</option>
              </select>
              <!-- v15.37: All Brands toggle -->
              <label id="inventoryBrandFilter" style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-secondary);cursor:pointer;">
                <input type="checkbox" id="inventoryShowAllBrands" onchange="toggleInventoryBrandFilter(this.checked)" style="accent-color:var(--accent);">
                All Brands
              </label>
              <button class="btn btn-primary btn-small" onclick="openInventoryModal()" style="display: flex; align-items: center; gap: 6px; height: 38px;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Add Item
              </button>
          </div>
          
          <!-- Summary Stats -->
          <div id="inventoryStats" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: var(--space-3); margin-bottom: var(--space-6);">
            <div style="background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: var(--space-4); text-align: center;">
              <div style="font-size: var(--text-3xl); font-weight: 600; color: var(--accent);" id="statTotalItems">0</div>
              <div style="font-size: var(--text-sm); color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px;">Total Items</div>
            </div>
            <div style="background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: var(--space-4); text-align: center;">
              <div style="font-size: var(--text-3xl); font-weight: 600; color: #60a5fa;" id="statProducts">0</div>
              <div style="font-size: var(--text-sm); color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px;">Products</div>
            </div>
            <div style="background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: var(--space-4); text-align: center;">
              <div style="font-size: var(--text-3xl); font-weight: 600; color: #c084fc;" id="statServices">0</div>
              <div style="font-size: var(--text-sm); color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px;">Services</div>
            </div>
            <div style="background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: var(--space-4); text-align: center;">
              <div style="font-size: var(--text-3xl); font-weight: 600; color: #ff6b6b;" id="statLowStock">0</div>
              <div style="font-size: var(--text-sm); color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px;">Low Stock</div>
            </div>
          </div>
          
          <!-- Inventory Grid -->
          <div id="inventoryGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: var(--space-4);">
            <!-- Inventory items will be rendered here -->
          </div>
        </div>
      </div>
      
      <!-- v10.5.25: Inventory Item Modal -->
      <div class="inventory-modal-overlay" id="inventoryModalOverlay" onclick="closeInventoryModal()">
        <div class="inventory-modal" onclick="event.stopPropagation()">
          <div class="inventory-modal-header">
            <div class="inventory-modal-title">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
              <span id="inventoryModalTitle">Add Product/Service</span>
            </div>
            <button class="inventory-modal-close" onclick="closeInventoryModal()">×</button>
          </div>
          <div class="inventory-modal-body">
            <!-- Type Toggle -->
            <div class="inventory-form-group" id="inventoryTypeToggle">
              <label class="inventory-form-label">Type</label>
              <div class="inventory-type-toggle">
                <button type="button" class="inventory-type-btn active" data-type="product" onclick="setInventoryType('product')">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
                  Product
                </button>
                <button type="button" class="inventory-type-btn" data-type="service" onclick="setInventoryType('service')">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                  Service
                </button>
              </div>
            </div>
            
            <!-- Image Upload -->
            <div class="inventory-form-group">
              <label class="inventory-form-label">Image</label>
              <div class="inventory-image-upload" id="inventoryImageUpload" onclick="document.getElementById('inventoryImageInput').click()">
                <div id="inventoryImageEmpty">
                  <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--text-tertiary)" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
                  <div style="font-size: var(--text-base); color: var(--text-secondary); margin-top: var(--space-2);">Click to upload or drag image</div>
                </div>
                <div id="inventoryImagePreviewContainer" class="inventory-image-preview" style="display: none;">
                  <img id="inventoryImagePreview" alt="Preview">
                  <button class="inventory-image-remove" onclick="event.stopPropagation(); clearInventoryImage()">×</button>
                </div>
              </div>
              <input type="file" id="inventoryImageInput" accept="image/*" style="display: none;" onchange="handleInventoryImageUpload(event)">
              <div class="inventory-image-sources">
                <button type="button" class="inventory-image-source-btn" onclick="openLibraryImagePicker()">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                  From Library
                </button>
                <button type="button" class="inventory-image-source-btn" onclick="openStudioImagePicker()">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                  From Studio
                </button>
              </div>
            </div>
            
            <!-- Name & SKU -->
            <div class="inventory-form-row">
              <div class="inventory-form-group">
                <label class="inventory-form-label">Name *</label>
                <input type="text" class="inventory-form-input" id="inventoryItemName" placeholder="Product or service name">
              </div>
              <div class="inventory-form-group" id="inventorySkuGroup">
                <label class="inventory-form-label">SKU / Code</label>
                <input type="text" class="inventory-form-input" id="inventoryItemSku" placeholder="e.g., PROD-001">
              </div>
            </div>
            
            <!-- Description -->
            <div class="inventory-form-group">
              <label class="inventory-form-label">Description</label>
              <textarea class="inventory-form-textarea" id="inventoryItemDescription" placeholder="Brief description of the product or service"></textarea>
            </div>
            
            <!-- Price & Category -->
            <div class="inventory-form-row">
              <div class="inventory-form-group">
                <label class="inventory-form-label" id="inventoryPriceLabel">Price ($)</label>
                <input type="number" class="inventory-form-input" id="inventoryItemPrice" placeholder="0.00" step="0.01" min="0">
              </div>
              <div class="inventory-form-group">
                <label class="inventory-form-label">Category</label>
                <select class="inventory-form-select" id="inventoryItemCategory">
                  <option value="General">General</option>
                  <option value="Products">Products</option>
                  <option value="Services">Services</option>
                  <option value="Digital">Digital</option>
                  <option value="Consulting">Consulting</option>
                </select>
              </div>
            </div>
            
            <!-- Product-specific: Stock -->
            <div id="inventoryStockSection">
              <div class="inventory-form-row">
                <div class="inventory-form-group">
                  <label class="inventory-form-label">Stock Quantity</label>
                  <input type="number" class="inventory-form-input" id="inventoryItemStock" placeholder="0" min="0">
                </div>
                <div class="inventory-form-group">
                  <label class="inventory-form-label">Low Stock Alert</label>
                  <input type="number" class="inventory-form-input" id="inventoryItemLowStock" placeholder="5" min="0">
                </div>
              </div>
            </div>
            
            <!-- Service-specific: Duration -->
            <div id="inventoryDurationSection" style="display: none;">
              <div class="inventory-form-group">
                <label class="inventory-form-label">Duration / Billing</label>
                <select class="inventory-form-select" id="inventoryItemDuration">
                  <option value="Per Hour">Per Hour</option>
                  <option value="Per Day">Per Day</option>
                  <option value="Per Project">Per Project</option>
                  <option value="Monthly">Monthly</option>
                  <option value="Annually">Annually</option>
                </select>
              </div>
            </div>

            <!-- v15.16: Possession-specific fields (LifeAI mode) -->
            <div id="inventoryPossessionFields" style="display: none;">
              <div class="inventory-form-row">
                <div class="inventory-form-group">
                  <label class="inventory-form-label">Location</label>
                  <input type="text" class="inventory-form-input" id="inventoryItemLocation" placeholder="e.g., Home, Office, Storage">
                </div>
                <div class="inventory-form-group">
                  <label class="inventory-form-label">Condition</label>
                  <select class="inventory-form-select" id="inventoryItemCondition">
                    <option value="New">New</option>
                    <option value="Like New">Like New</option>
                    <option value="Good" selected>Good</option>
                    <option value="Fair">Fair</option>
                    <option value="Poor">Poor</option>
                  </select>
                </div>
              </div>
              <div class="inventory-form-row">
                <div class="inventory-form-group">
                  <label class="inventory-form-label">Purchase Date</label>
                  <input type="date" class="inventory-form-input" id="inventoryItemPurchaseDate">
                </div>
                <div class="inventory-form-group">
                  <label class="inventory-form-label">Notes</label>
                  <input type="text" class="inventory-form-input" id="inventoryItemNotes" placeholder="Any additional notes">
                </div>
              </div>
            </div>
          </div>
          <div class="inventory-modal-footer">
            <div style="display:flex;gap:var(--space-2);">
              <button class="btn btn-secondary btn-small" id="inventoryDeleteBtn" onclick="deleteInventoryItem()" style="display: none; color: #ff6b6b;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                Delete
              </button>
              <button class="btn btn-secondary btn-small" id="inventoryDuplicateBtn" onclick="duplicateInventoryItem()" style="display: none;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                Duplicate
              </button>
            </div>
            <div style="display: flex; gap: var(--space-2);">
              <button class="btn btn-secondary btn-small" onclick="closeInventoryModal()">Cancel</button>
              <button class="btn btn-primary btn-small" onclick="saveInventoryItem()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                Save Item
              </button>
            </div>
          </div>
        </div>
      </div>
