
      <!-- Pulse View - Brand Health Dashboard -->
      <div id="pulseView" class="panel-view hidden">
        <div class="panel">
          <!-- Breadcrumb Trail -->
          <div class="breadcrumb">
            <span class="breadcrumb-item"><a href="#" onclick="showView('agent'); return false;">Home</a></span>
            <span class="breadcrumb-item active">Pulse</span>
          </div>

          <!-- v22.37: Uniform gold header -->
          <div class="panel-header" style="margin-bottom: var(--space-2);display:flex;align-items:center;"><span>Pulse</span><button class="section-help-btn" onclick="showSectionHelp('pulse')" title="How to use Pulse">?</button></div>
          <p style="color: var(--text-muted); font-size: 13px; margin-bottom: var(--space-5); line-height: 1.5;">Your daily command center for goals, tasks, and progress.</p>

          <!-- v28.8: Pulse header with goal actions — Motivate Me next to +Goal -->
          <div class="pulse-3-header" style="justify-content:flex-end;">
            <button class="pulse-3-btn pulse-3-btn-secondary" onclick="motivateMe()" style="display:flex;align-items:center;gap:6px;">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
              Motivate Me
            </button>
            <div class="pulse-goal-dropdown" id="pulseGoalDropdown">
              <button class="pulse-3-btn pulse-3-btn-primary rhythm-add-trigger" onclick="togglePulseGoalDropdown()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                Goal
                <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
              </button>
              <div class="rhythm-add-menu" id="pulseGoalMenu">
                <div class="rhythm-add-menu-item" onclick="createInlineGoal(); closePulseGoalDropdown();">
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                  <span>Quick Goal</span>
                </div>
                <div class="rhythm-add-menu-item" onclick="openNewGoalModal(); closePulseGoalDropdown();">
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18h6M10 22h4"/><path d="M12 2a7 7 0 017 7c0 2.38-1.19 4.47-3 5.74V17a1 1 0 01-1 1H9a1 1 0 01-1-1v-2.26C6.19 13.47 5 11.38 5 9a7 7 0 017-7z"/></svg>
                  <span>AI Goal</span>
                </div>
              </div>
            </div>
          </div>

          <!-- v28.8: Overview Stats (progress ring, active goals, done today, streak) -->
          <div class="pulse-3-overview" id="pulse3Overview"></div>

          <!-- v28.8: Inline Calendar -->
          <div id="pulseCalendarSection" style="margin-bottom:var(--space-8, 32px);"></div>

          <!-- Active Goal Checklists -->
          <div class="pulse-3-checklists" id="pulse3Checklists"></div>

          <!-- v28.8: Completed Goals (collapsed by default) -->
          <div id="pulseCompletedGoalsSection" style="margin-top:24px;"></div>

          <!-- Smart Suggestions (hidden by default) -->
          <div class="pulse-3-suggestions" id="pulse3Suggestions" style="display: none;">
            <div class="pulse-3-section-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-3);">
              <div style="display: flex; align-items: center; gap: var(--space-2);">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18h6M10 22h4"/><path d="M12 2a7 7 0 017 7c0 2.38-1.19 4.47-3 5.74V17a1 1 0 01-1 1H9a1 1 0 01-1-1v-2.26C6.19 13.47 5 11.38 5 9a7 7 0 017-7z"/></svg>
                Smart Suggestions
                <span id="pulse3SuggestionsTime" style="font-size: var(--text-xs); color: var(--text-muted);"></span>
              </div>
              <button class="pulse-3-btn pulse-3-btn-secondary" onclick="refreshPulseSuggestions()">Refresh</button>
            </div>
            <div id="pulse3SuggestionsList"></div>
          </div>
        </div>
      </div>
