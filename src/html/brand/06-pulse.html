
      <!-- Pulse View - Brand Health Dashboard -->
      <div id="pulseView" class="panel-view hidden">
        <div class="panel">
          <!-- Breadcrumb Trail -->
          <div class="breadcrumb">
            <span class="breadcrumb-item"><a href="#" onclick="showView('agent'); return false;">Home</a></span>
            <span class="breadcrumb-item active">Pulse</span>
          </div>
          
          <!-- v22.37: Uniform gold header -->
          <div class="panel-header" style="margin-bottom: var(--space-2);display:flex;align-items:center;"><span>Pulse</span><button class="section-help-btn" onclick="showSectionHelp('pulse')" title="How to use Pulse">?</button></div>
          <p style="color: var(--text-muted); font-size: 13px; margin-bottom: var(--space-5); line-height: 1.5;">Track your goals, habits, and progress.</p>
          <!-- v22.41: Pulse 3.0 - Goals & Checklists -->
          <div class="pulse-3-header">
            <div style="display:flex;align-items:center;gap:var(--space-3);">
              <!-- v15.37: Goal mode filter toggle -->
              <label id="pulseGoalModeToggle" style="display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); cursor: pointer;">
                <input type="checkbox" id="pulseShowAllGoals" onchange="togglePulseGoalFilter(this.checked)" style="accent-color: var(--accent);">
                Show All
              </label>
            </div>
            <!-- v22.41: + Goal dropdown (mirrors Rhythm add dropdown) -->
            <div class="pulse-goal-dropdown" id="pulseGoalDropdown">
              <button class="pulse-3-btn pulse-3-btn-primary rhythm-add-trigger" onclick="togglePulseGoalDropdown()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                Goal
                <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
              </button>
              <div class="rhythm-add-menu" id="pulseGoalMenu">
                <div class="rhythm-add-menu-item" onclick="createInlineGoal(); closePulseGoalDropdown();">
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                  <span>Quick Goal</span>
                </div>
                <div class="rhythm-add-menu-item" onclick="openNewGoalModal(); closePulseGoalDropdown();">
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18h6M10 22h4"/><path d="M12 2a7 7 0 017 7c0 2.38-1.19 4.47-3 5.74V17a1 1 0 01-1 1H9a1 1 0 01-1-1v-2.26C6.19 13.47 5 11.38 5 9a7 7 0 017-7z"/></svg>
                  <span>AI Goal</span>
                </div>
              </div>
            </div>
          </div>
          
          <!-- Overview Stats -->
          <div class="pulse-3-overview" id="pulse3Overview">
            <!-- Populated by JS -->
          </div>
          
          <!-- Active Checklists -->
          <div class="pulse-3-checklists" id="pulse3Checklists">
            <!-- Populated by JS -->
          </div>

          <!-- v13.2: Smart Suggestions -->
          <div class="pulse-3-suggestions" id="pulse3Suggestions" style="display: none;">
            <div class="pulse-3-section-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-3);">
              <div style="display: flex; align-items: center; gap: var(--space-2);">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18h6M10 22h4"/><path d="M12 2a7 7 0 017 7c0 2.38-1.19 4.47-3 5.74V17a1 1 0 01-1 1H9a1 1 0 01-1-1v-2.26C6.19 13.47 5 11.38 5 9a7 7 0 017-7z"/></svg>
                Smart Suggestions
                <span id="pulse3SuggestionsTime" style="font-size: var(--text-xs); color: var(--text-muted);"></span>
              </div>
              <button class="pulse-3-btn pulse-3-btn-secondary" onclick="refreshPulseSuggestions()">Refresh</button>
            </div>
            <div id="pulse3SuggestionsList"></div>
          </div>

          <!-- v10.5.25: Pulse 2.0 - Journal & Analytics Redesign -->
          <div class="pulse-2-container">
            <!-- Left Column - Journal & Activity -->
            <div class="pulse-2-main">
              <!-- Journal Section -->
              <div class="pulse-2-journal">
                <div class="pulse-2-journal-header">
                  <div class="pulse-2-journal-title">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
                    Journal
                  </div>
                  <div class="pulse-2-journal-date-nav">
                    <button class="pulse-2-nav-btn" onclick="pulseNavigateDate(-1)">
                      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
                    </button>
                    <span class="pulse-2-current-date" id="pulse2CurrentDate">Today</span>
                    <button class="pulse-2-nav-btn" onclick="pulseNavigateDate(1)">
                      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
                    </button>
                  </div>
                </div>
                
                <!-- New Entry Input -->
                <div class="pulse-2-new-entry">
                  <!-- v13.2: Subject field -->
                  <input type="text" class="pulse-2-entry-subject" id="pulse2EntrySubject" placeholder="Subject (optional)...">
                  <textarea class="pulse-2-entry-input" id="pulse2EntryInput" placeholder="What's on your mind today? Reflect on your progress, challenges, or wins..."></textarea>
                  <div class="pulse-2-entry-actions">
                    <!-- v13.2: Tag pills replace mood selector -->
                    <div class="pulse-2-entry-tags" id="pulse2EntryTags">
                      <button class="pulse-2-tag-btn" data-tag="reflection" onclick="togglePulse2Tag(this)">Reflection</button>
                      <button class="pulse-2-tag-btn" data-tag="progress" onclick="togglePulse2Tag(this)">Progress</button>
                      <button class="pulse-2-tag-btn" data-tag="challenge" onclick="togglePulse2Tag(this)">Challenge</button>
                      <button class="pulse-2-tag-btn" data-tag="idea" onclick="togglePulse2Tag(this)">Idea</button>
                      <button class="pulse-2-tag-btn" data-tag="win" onclick="togglePulse2Tag(this)">Win</button>
                    </div>
                    <button class="pulse-2-btn pulse-2-btn-primary" onclick="savePulse2Entry()">Save Entry</button>
                  </div>
                </div>
                
                <!-- Journal Entries List -->
                <div class="pulse-2-entries-list" id="pulse2EntriesList">
                  <!-- Populated by JS -->
                </div>
              </div>
              
              <!-- Activity Feed -->
              <div class="pulse-2-activity">
                <div class="pulse-2-section-header">
                  <div class="pulse-2-section-title">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>
                    Recent Activity
                  </div>
                  <button class="pulse-2-btn" onclick="viewAllActivity()">View All</button>
                </div>
                <div class="pulse-2-activity-list" id="pulse2ActivityList">
                  <!-- Populated by JS -->
                </div>
              </div>
            </div>
            
            <!-- Right Column - Analytics Sidebar -->
            <div class="pulse-2-sidebar">
              <!-- Weekly Overview Card -->
              <div class="pulse-2-overview-card">
                <div class="pulse-2-overview-title">This Week</div>
                <div class="pulse-2-overview-stats">
                  <div class="pulse-2-overview-stat">
                    <div class="pulse-2-overview-value" id="pulse2WeekTasks">0</div>
                    <div class="pulse-2-overview-label">Tasks Done</div>
                  </div>
                  <div class="pulse-2-overview-stat">
                    <div class="pulse-2-overview-value" id="pulse2WeekContent">0</div>
                    <div class="pulse-2-overview-label">Content Created</div>
                  </div>
                  <div class="pulse-2-overview-stat">
                    <div class="pulse-2-overview-value" id="pulse2WeekStreak">0</div>
                    <div class="pulse-2-overview-label">Day Streak</div>
                  </div>
                </div>
                <div class="pulse-2-week-chart" id="pulse2WeekChart">
                  <!-- 7-day mini chart -->
                </div>
              </div>
              
              <!-- v13.2: Mood Tracker removed, replaced by Focus Notes integration in journal -->
              
              <!-- Focus Session Summary -->
              <div class="pulse-2-focus-card">
                <div class="pulse-2-card-title">Focus Sessions</div>
                <div class="pulse-2-focus-list" id="pulse2FocusList">
                  <!-- Recent focus notes from Focus view -->
                </div>
              </div>
              
              <!-- AI Insights -->
              <div class="pulse-2-insights-card">
                <div class="pulse-2-insights-header">
                  <div class="pulse-2-card-title">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                    AI Insights
                  </div>
                  <button class="pulse-2-refresh-btn" onclick="generatePulse2Insights()">
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
                  </button>
                </div>
                <div class="pulse-2-insights-list" id="pulse2InsightsList">
                  <div class="pulse-2-insight">
                    <div class="pulse-2-insight-icon"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18h6M10 22h4"/><path d="M12 2a7 7 0 017 7c0 2.38-1.19 4.47-3 5.74V17a1 1 0 01-1 1H9a1 1 0 01-1-1v-2.26C6.19 13.47 5 11.38 5 9a7 7 0 017-7z"/></svg></div>
                    <div class="pulse-2-insight-text">Complete your daily reflection to build consistent habits.</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
