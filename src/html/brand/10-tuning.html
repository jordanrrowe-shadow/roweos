
      <!-- History View -->
      <div id="tuningView" class="panel-view hidden">
        <div class="panel">
          <!-- Breadcrumb Trail -->
          <div class="breadcrumb">
            <span class="breadcrumb-item"><a href="#" onclick="showView('agent'); return false;">Home</a></span>
            <span class="breadcrumb-item active">History</span>
          </div>
          
          <div class="panel-header" style="margin-bottom: var(--space-2);display:flex;align-items:center;">
            <span>Conversation History</span>
            <button class="btn btn-secondary btn-small" onclick="exportTuningData()" style="margin-left:auto;margin-right:8px;">Export Training Data</button>
            <button class="section-help-btn" onclick="showSectionHelp('tuning')" title="How to use History">?</button>
          </div>
          <p style="color: var(--text-muted); font-size: 13px; margin-bottom: var(--space-5); line-height: 1.5;">Review past conversations, continue where you left off, and provide feedback to improve AI responses.</p>
          
          <!-- v10.5.25: Mode Filter Tabs -->
          <div class="history-mode-tabs">
            <button class="history-mode-tab active" data-mode="all" onclick="filterHistoryByMode('all')">All</button>
            <button class="history-mode-tab" data-mode="brand" onclick="filterHistoryByMode('brand')">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
              BrandAI
            </button>
            <button class="history-mode-tab" data-mode="life" onclick="filterHistoryByMode('life')">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              LifeAI
            </button>
          </div>
          
          <!-- BrandAI Conversations Section -->
          <div class="tuning-section" id="brandConversationsSection">
            <div class="tuning-section-header">
              <span class="tuning-section-title">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: -2px; margin-right: 6px;"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                BrandAI Conversations
              </span>
              <span class="tuning-section-count" id="brandConversationCount">0</span>
            </div>
            <div id="tuningConversations"></div>
          </div>
          
          <!-- v10.5.25: LifeAI Conversations Section -->
          <div class="tuning-section" id="lifeConversationsSection" style="margin-top: 32px;">
            <div class="tuning-section-header">
              <span class="tuning-section-title">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: -2px; margin-right: 6px;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                LifeAI Conversations
              </span>
              <span class="tuning-section-count" id="lifeConversationCount">0</span>
            </div>
            <div id="lifeConversations"></div>
          </div>
          
          <!-- BrandAI Studio Outputs Section -->
          <div class="tuning-section" id="brandStudioSection" style="margin-top: 32px;">
            <div class="tuning-section-header">
              <span class="tuning-section-title">◆ BrandAI Studio Outputs</span>
              <span class="tuning-section-count" id="brandStudioOutputCount">0</span>
            </div>
            <div id="tuningHistory"></div>
          </div>

          <!-- v15.20: LifeAI Studio Outputs Section - always present, filter controls visibility -->
          <div class="tuning-section" id="lifeStudioSection" style="margin-top: 32px;">
            <div class="tuning-section-header">
              <span class="tuning-section-title">◇ Life Studio Outputs</span>
              <span class="tuning-section-count" id="lifeStudioOutputCount">0</span>
            </div>
            <div id="lifeStudioHistory"></div>
          </div>

        </div>
      </div>
