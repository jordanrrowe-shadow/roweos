<!DOCTYPE html>
<html>
<head>
<title>RoweOS Stripe Tier Logos</title>
<style>
  body { background: #000; display: flex; gap: 40px; justify-content: center; align-items: center; min-height: 100vh; margin: 0; flex-wrap: wrap; padding: 40px; }
  .logo { width: 512px; height: 512px; border-radius: 40px; position: relative; overflow: hidden; background: linear-gradient(135deg, #141414, #0a0a0a); display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .letter { font-family: Georgia, 'Times New Roman', serif; font-size: 360px; font-weight: 400; font-style: italic; line-height: 1; background: linear-gradient(135deg, var(--c1), var(--c2), var(--c3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .label { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 28px; font-weight: 300; letter-spacing: 8px; opacity: 0.5; margin-top: -20px; }
  .solo { --c1: #c4a882; --c2: #a89878; --c3: #d4bf9a; }
  .solo .label { color: #a89878; }
  .founder { --c1: #c4a882; --c2: #a89878; --c3: #d4bf9a; }
  .founder .label { color: #a89878; }
  .premium { --c1: #d4af37; --c2: #c4a045; --c3: #e8c84a; }
  .premium .label { color: #d4af37; }
  h2 { color: #666; font-family: -apple-system, sans-serif; font-weight: 300; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; text-align: center; width: 100%; margin: 0 0 20px; }
  p { color: #444; font-family: -apple-system, sans-serif; font-size: 12px; text-align: center; width: 100%; margin: 20px 0 0; }
</style>
</head>
<body>
  <h2>Right-click each logo &rarr; Save as PNG (or screenshot at 512x512)</h2>
  <div class="logo solo">
    <div class="letter">S</div>
    <div class="label">SOLO</div>
  </div>
  <div class="logo founder">
    <div class="letter">F</div>
    <div class="label">FOUNDER</div>
  </div>
  <div class="logo premium">
    <div class="letter">P</div>
    <div class="label">PREMIUM</div>
  </div>
  <p>512x512px &bull; Stripe recommends square product images</p>
</body>
</html>
