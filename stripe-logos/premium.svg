  <rect width="512" height="512" fill="url(#bgGrad)" rx="40"/>
  <text x="256" y="340" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="360" font-weight="400" font-style="italic" fill="url(#goldGrad)" filter="url(#glow)">P</text>
